<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

// ── STORAGE ───────────────────────────────────────────────────────────────────
const LS = {
  get: (k) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
};

// ── MUSCLE GROUPS (hierarchical) ──────────────────────────────────────────────
const MUSCLE_TREE = [
  { key:"Beine", label:"Beine", children:["Quadrizeps","Beinbizeps","Abduktoren","Adduktoren","Waden","Gesäß"] },
  { key:"Rücken", label:"Rücken", children:["Latissimus","Trapez / Nacken","Unterer Rücken"] },
  { key:"Brust", label:"Brust", children:["Obere Brust","Mittlere Brust","Untere Brust"] },
  { key:"Schultern", label:"Schultern", children:["Vordere Schultern","Seitliche Schultern","Hintere Schultern"] },
  { key:"Arme", label:"Arme", children:["Bizeps","Trizeps","Unterarme"] },
  { key:"Bauch", label:"Bauch", children:["Obere Bauchmuskeln","Untere Bauchmuskeln","Seitliche Bauchmuskeln"] },
];
// flat list of all selectable muscles (parents + children)
const ALL_MUSCLES = MUSCLE_TREE.flatMap(g => [g.key, ...g.children]);

const days = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const dayShort = ["MO","DI","MI","DO","FR","SA","SO"];

// ── COLORS ────────────────────────────────────────────────────────────────────
const C = {
  bg:"#111318", surface:"#1c1f26", surfaceHover:"#22262f",
  border:"#2e3340", borderLight:"#3a3f4d",
  textPrimary:"#f0f2f5", textSecondary:"#9aa3b2", textMuted:"#5c6473",
  accent:"#7ee8a2", accentDim:"#1e3d2a", accentText:"#0d1a12",
  red:"#ff6b6b", redDim:"#3d1a1a",
  yellow:"#ffd166", yellowDim:"#3d2f00",
  blue:"#74b9ff", orange:"#fd9644",
  drop:"#c084fc", dropDim:"#2d1854",
};

const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = (iso) => { if(!iso)return""; const[y,m,d]=iso.split("-"); return`${d}.${m}.${y}`; };
const genId = () => Date.now() + Math.random();

// ── SHARED STYLES ─────────────────────────────────────────────────────────────
const sc = {
  card: { background:C.surface, border:`1px solid ${C.border}`, borderRadius:8 },
  lbl: { fontSize:10, fontWeight:700, letterSpacing:"0.12em", color:C.textMuted, textTransform:"uppercase" },
  inp: { background:C.bg, border:`1px solid ${C.border}`, color:C.textPrimary, padding:"10px 12px", fontSize:14, fontFamily:"inherit", borderRadius:6, outline:"none", boxSizing:"border-box", width:"100%" },
  btnP: { background:C.accent, color:C.accentText, border:"none", padding:"10px 20px", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"inherit", borderRadius:6 },
  btnS: { background:C.surfaceHover, color:C.textSecondary, border:`1px solid ${C.border}`, padding:"10px 18px", cursor:"pointer", fontSize:13, fontFamily:"inherit", borderRadius:6 },
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const todayIso = todayStr;
function buildProgressData(sessions) {
  const byEx={};
  Object.values(sessions).forEach(s=>(s.exercises||[]).forEach(ex=>{
    if(!byEx[ex.name])byEx[ex.name]=[];
    // flatten drop-sets for progress: take max weight across all drops per set
    const flatSets=(ex.sets||[]).map(set=>{
      if(set.type==="drop"&&set.drops){
        const maxW=Math.max(0,...set.drops.map(d=>parseFloat(d.weight)||0));
        const totR=set.drops.reduce((a,d)=>a+(parseInt(d.reps)||0),0);
        return{reps:totR,weight:maxW};
      }
      return set;
    });
    byEx[ex.name].push({date:s.date,sets:flatSets});
  }));
  Object.keys(byEx).forEach(n=>byEx[n].sort((a,b)=>(a.date||"").localeCompare(b.date||"")));
  return byEx;
}
function calcStats(sets) {
  const flat=(sets||[]).map(set=>{
    if(set.type==="drop"&&set.drops){
      const maxW=Math.max(0,...set.drops.map(d=>parseFloat(d.weight)||0));
      const totR=set.drops.reduce((a,d)=>a+(parseInt(d.reps)||0),0);
      return{reps:totR,weight:maxW};
    }
    return set;
  }).filter(s=>s.reps>0);
  const volume=Math.round(flat.reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0));
  const maxWeight=Math.max(0,...flat.map(s=>parseFloat(s.weight)||0));
  const totalReps=flat.reduce((a,s)=>a+(parseInt(s.reps)||0),0);
  const avgReps=flat.length>0?Math.round(totalReps/flat.length):0;
  return{volume,maxWeight,totalReps,setsCount:flat.length,avgReps};
}
function getWeekLabel(dateStr) {
  if(!dateStr)return"Unbekannt";
  const d=new Date(dateStr),start=new Date(d);
  start.setDate(d.getDate()-((d.getDay()+6)%7));
  const end=new Date(start); end.setDate(start.getDate()+6);
  return`${fmtDate(start.toISOString().split("T")[0])} – ${fmtDate(end.toISOString().split("T")[0])}`;
}

// ── MUSCLE PICKER (hierarchical) ──────────────────────────────────────────────
function MusclePicker({selected, onChange}) {
  const [openGroups, setOpenGroups] = useState({});
  const toggle = (m) => onChange(selected.includes(m) ? selected.filter(x=>x!==m) : [...selected, m]);
  const toggleGroup = (key) => setOpenGroups(p=>({...p,[key]:!p[key]}));
  const isParentSelected = (group) => selected.includes(group.key);
  const someChildSelected = (group) => group.children.some(c=>selected.includes(c));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {MUSCLE_TREE.map(group => {
        const open = openGroups[group.key];
        const parentOn = isParentSelected(group);
        const childOn = someChildSelected(group);
        const anyOn = parentOn || childOn;
        return (
          <div key={group.key}>
            {/* Parent row */}
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>toggle(group.key)}
                style={{flex:1,background:parentOn?C.accent:C.surfaceHover,color:parentOn?C.accentText:C.textSecondary,border:`1px solid ${parentOn?C.accent:anyOn?C.borderLight:C.border}`,padding:"7px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:parentOn?700:500,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{group.label}</span>
                {childOn&&!parentOn&&<span style={{fontSize:10,color:C.accent,fontWeight:700}}>{group.children.filter(c=>selected.includes(c)).length} ausgewählt</span>}
              </button>
              <button onClick={()=>toggleGroup(group.key)}
                style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textMuted,padding:"7px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,minWidth:36}}>
                {open?"▲":"▼"}
              </button>
            </div>
            {/* Children */}
            {open && (
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6,paddingLeft:12}}>
                {group.children.map(m=>(
                  <button key={m} onClick={()=>toggle(m)}
                    style={{background:selected.includes(m)?C.accent:C.bg,color:selected.includes(m)?C.accentText:C.textMuted,border:`1px solid ${selected.includes(m)?C.accent:C.border}`,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:20,fontWeight:selected.includes(m)?700:400}}>
                    {m}
                  </button>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── MUSCLE TAGS (display) ─────────────────────────────────────────────────────
function MuscleTags({muscles, small=false}) {
  if(!muscles||muscles.length===0) return null;
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:small?4:8}}>
      {muscles.map(m=>(
        <span key={m} style={{fontSize:small?9:10,background:C.bg,border:`1px solid ${C.border}`,padding:small?"1px 6px":"2px 8px",borderRadius:20,color:C.textSecondary}}>{m}</span>
      ))}
    </div>
  );
}

// ── EXERCISE FORM ─────────────────────────────────────────────────────────────
function ExerciseForm({ex, setEx, onSave, onCancel, title="Übung hinzufügen"}) {
  return (
    <div style={{...sc.card,padding:"18px",marginTop:10,marginBottom:10}}>
      <div style={{...sc.lbl,marginBottom:12}}>{title}</div>
      <input placeholder="Übungsname" value={ex.name} onChange={e=>setEx(p=>({...p,name:e.target.value}))} style={{...sc.inp,marginBottom:12}}/>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[["Sätze","sets",1,10],["Wiederholungen","reps",1,100]].map(([label,field,min,max])=>(
          <div key={field} style={{flex:1}}>
            <div style={{...sc.lbl,marginBottom:6}}>{label}</div>
            <input type="number" min={min} max={max} value={ex[field]} onChange={e=>setEx(p=>({...p,[field]:+e.target.value}))} style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:16}}/>
          </div>
        ))}
      </div>
      <div style={{marginBottom:14}}>
        <div style={{...sc.lbl,marginBottom:8}}>Muskelgruppen</div>
        <MusclePicker selected={ex.muscles} onChange={m=>setEx(p=>({...p,muscles:m}))}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onSave} style={{...sc.btnP,flex:1}}>Speichern</button>
        <button onClick={onCancel} style={sc.btnS}>Abbrechen</button>
      </div>
    </div>
  );
}

// ── SESSION SET ROW ───────────────────────────────────────────────────────────
// Renders one set row. Supports normal and drop-set types.
function SetRow({set, setIdx, onUpdate, onRemove, onToggleDrop, onAddDrop, onRemoveDrop, onUpdateDrop}) {
  const isDrop = set.type === "drop";
  return (
    <div style={{marginBottom:8}}>
      {/* Set header: number + type toggle + remove */}
      <div style={{display:"grid",gridTemplateColumns:"36px 1fr auto auto",gap:6,alignItems:"center",marginBottom:isDrop?6:0}}>
        <div style={{fontWeight:700,fontSize:13,color:isDrop?C.drop:C.textMuted,textAlign:"center",background:isDrop?C.dropDim:C.bg,border:`1px solid ${isDrop?C.drop:C.border}`,borderRadius:6,padding:"10px 0"}}>{setIdx+1}</div>
        {!isDrop ? (
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <input type="number" inputMode="decimal" value={set.reps} onChange={e=>onUpdate("reps",e.target.value)}
                style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:16,padding:"10px"}}/>
              <input type="number" inputMode="decimal" value={set.weight} placeholder="–" onChange={e=>onUpdate("weight",e.target.value)}
                style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:16,padding:"10px",color:C.accent}}/>
            </div>
          </>
        ) : (
          <div style={{fontSize:12,fontWeight:700,color:C.drop,padding:"0 4px",alignSelf:"center"}}>DROP-SET</div>
        )}
        <button onClick={onToggleDrop}
          title={isDrop?"Zu Normal umwandeln":"Als Drop-Set markieren"}
          style={{background:isDrop?C.dropDim:C.surfaceHover,border:`1px solid ${isDrop?C.drop:C.border}`,color:isDrop?C.drop:C.textMuted,padding:"8px 9px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,whiteSpace:"nowrap"}}>
          {isDrop?"↩ Normal":"↓ Drop"}
        </button>
        <button onClick={onRemove} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:"4px 6px"}}
          onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>
      </div>

      {/* Drop-set: show each drop unit */}
      {isDrop && (
        <div style={{paddingLeft:12,borderLeft:`2px solid ${C.drop}`,marginLeft:18}}>
          {/* column headers */}
          <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 28px",gap:6,marginBottom:4}}>
            {["D","Wdh.","kg",""].map((h,i)=><div key={i} style={{...sc.lbl,textAlign:"center",fontSize:9,color:C.drop}}>{h}</div>)}
          </div>
          {(set.drops||[]).map((drop,di)=>(
            <div key={di} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 28px",gap:6,marginBottom:5,alignItems:"center"}}>
              <div style={{fontWeight:700,fontSize:11,color:C.drop,textAlign:"center",background:C.dropDim,border:`1px solid ${C.drop}`,borderRadius:4,padding:"8px 0"}}>{di+1}</div>
              <input type="number" inputMode="decimal" value={drop.reps} onChange={e=>onUpdateDrop(di,"reps",e.target.value)}
                style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:15,padding:"8px"}}/>
              <input type="number" inputMode="decimal" value={drop.weight} placeholder="–" onChange={e=>onUpdateDrop(di,"weight",e.target.value)}
                style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:15,padding:"8px",color:C.drop}}/>
              <button onClick={()=>onRemoveDrop(di)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:13,textAlign:"center"}}
                onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>
            </div>
          ))}
          <button onClick={onAddDrop}
            style={{width:"100%",background:"transparent",border:`1px dashed ${C.drop}`,color:C.drop,padding:"6px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,marginTop:2}}>
            + Drop-Einheit hinzufügen
          </button>
        </div>
      )}
    </div>
  );
}

// ── SET DISPLAY (in log / edit modal) ─────────────────────────────────────────
function SetDisplay({set, si}) {
  if(set.type==="drop"&&set.drops) {
    return (
      <div style={{background:C.dropDim,border:`1px solid ${C.drop}`,borderRadius:6,padding:"5px 10px",fontSize:11}}>
        <div style={{color:C.drop,fontWeight:700,fontSize:9,letterSpacing:"0.1em",marginBottom:3}}>DROP-SET {si+1}</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {set.drops.map((d,di)=>(
            <span key={di} style={{fontSize:11,background:C.bg,border:`1px solid ${C.border}`,padding:"2px 7px",borderRadius:4,color:C.textSecondary}}>
              <span style={{color:C.textPrimary,fontWeight:600}}>{d.reps}</span>×<span style={{color:C.drop,fontWeight:700}}>{d.weight||"–"}kg</span>
            </span>
          ))}
        </div>
      </div>
    );
  }
  return (
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:11}}>

    </div>

}

// ── PROGRESS CHART ────────────────────────────────────────────────────────────
function ProgressChart({data,dates,color,unit}) {
  if(data.length<2)return null;
  const w=600,h=140,pl=44,pr=10,pt=10,pb=32;
  const iw=w-pl-pr,ih=h-pt-pb;
  const minV=Math.min(...data)*0.95,maxV=Math.max(...data)*1.05||1,range=maxV-minV||1;
  const pts=data.map((v,i)=>({x:pl+(i/(data.length-1))*iw,y:pt+ih-((v-minV)/range)*ih,v,d:dates[i]}));
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
  const area=`M${pts[0].x},${pt+ih} `+pts.map(p=>`L${p.x},${p.y}`).join(" ")+` L${pts[pts.length-1].x},${pt+ih} Z`;
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",maxWidth:w,display:"block"}}>
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.25"/><stop offset="100%" stopColor={color} stopOpacity="0.02"/></linearGradient></defs>
        {Array.from({length:5},(_,i)=>{const y=pt+(i/4)*ih,val=maxV-(i/4)*range;return React.createElement("g",{key:i},React.createElement("line",{x1:pl,y1:y,x2:pl+iw,y2:y,stroke:C.border,strokeWidth:"1"}),React.createElement("text",{x:pl-6,y:y+4,textAnchor:"end",fontSize:"10",fill:C.textMuted},Math.round(val)));})};
        {pts.filter((_,i)=>data.length<=8||i%(Math.ceil(data.length/6))===0||i===data.length-1).map((p,i)=>React.createElement("text",{key:i,x:p.x,y:h-6,textAnchor:"middle",fontSize:"9",fill:C.textMuted},fmtDate(p.d)))}
        <path d={area} fill="url(#ag)"/>
        <polyline points={poly} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>React.createElement("circle",{key:i,cx:p.x,cy:p.y,r:i===pts.length-1?5:3.5,fill:color,stroke:C.surface,strokeWidth:"2"},React.createElement("title",null,`${fmtDate(p.d)}: ${p.v} ${unit}`)))}
      </svg>
    </div>
  );
}

function TrendBadge({first,last}) {
  if(first===undefined||last===undefined||first===last)return null;
  const diff=last-first,pct=first>0?Math.round((diff/first)*100):0,up=diff>0;
  return<span style={{fontSize:11,fontWeight:700,color:up?C.accent:C.red,background:up?C.accentDim:C.redDim,padding:"2px 8px",borderRadius:20}}>{up?"▲":"▼"} {Math.abs(pct)}%</span>;
}

function MusclePanel({sessions}) {
  const mv={};
  Object.values(sessions).forEach(s=>(s.exercises||[]).forEach(ex=>(ex.muscles||[]).forEach(m=>{
    if(!mv[m])mv[m]=0;
    mv[m]+=(ex.sets||[]).reduce((a,set)=>{
      if(set.type==="drop"&&set.drops)return a+set.drops.reduce((b,d)=>b+(parseFloat(d.weight)||0)*(parseInt(d.reps)||0),0);
      return a+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0);
    },0);
  })));
  const sorted=Object.entries(mv).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)return null;
  const maxV=sorted[0][1];
  return(
    <div style={{...sc.card,overflow:"hidden",marginBottom:16}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,...sc.lbl}}>Muskelgruppen — Gesamtvolumen</div>
      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {sorted.map(([m,vol])=>(
          <div key={m}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:13,color:C.textPrimary,fontWeight:600}}>{m}</span>
              <span style={{fontSize:12,color:C.textMuted}}>{Math.round(vol).toLocaleString("de-DE")} kg·Wdh</span>
            </div>
            <div style={{background:C.bg,borderRadius:4,height:6,overflow:"hidden"}}>
              <div style={{background:C.accent,height:"100%",width:`${(vol/maxV)*100}%`,borderRadius:4}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── EDIT SESSION MODAL ────────────────────────────────────────────────────────
function EditSessionModal({sessionKey,session,onSave,onClose}) {
  const [date,setDate]=useState(session.date||"");
  const [exercises,setExercises]=useState(JSON.parse(JSON.stringify(session.exercises||[])));

  const updEx=(fn)=>setExercises(prev=>{const n=JSON.parse(JSON.stringify(prev));fn(n);return n;});
  const updateSet=(ei,si,field,val)=>updEx(n=>{n[ei].sets[si][field]=val;});
  const addSet=(ei)=>updEx(n=>{const last=n[ei].sets[n[ei].sets.length-1];n[ei].sets.push({reps:last?.reps||10,weight:""});});
  const removeSet=(ei,si)=>updEx(n=>{n[ei].sets=n[ei].sets.filter((_,i)=>i!==si);});
  const removeEx=(ei)=>setExercises(prev=>prev.filter((_,i)=>i!==ei));

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target.className==="modal-overlay")onClose();}}>
      <div className="modal-sheet">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:18,color:C.textPrimary}}>Training bearbeiten</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",padding:"4px 8px"}}>✕</button>
        </div>
        <div style={{...sc.card,padding:"14px 16px",marginBottom:16}}>
          <div style={{...sc.lbl,marginBottom:8}}>Datum</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...sc.inp,colorScheme:"dark",fontSize:15,fontWeight:700}}/>
        </div>
        {exercises.map((ex,ei)=>(
          <div key={ei} style={{...sc.card,marginBottom:12,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:700,fontSize:14,color:C.textPrimary}}>{ex.name}</div>
              <button onClick={()=>removeEx(ei)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:"2px 6px"}}
                onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>
            </div>
            <div style={{padding:"12px 16px"}}>
              <div style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 32px",gap:6,marginBottom:6}}>
                {["#","Wdh.","kg",""].map((h,i)=><div key={i} style={{...sc.lbl,textAlign:"center",fontSize:9}}>{h}</div>)}
              </div>
              {ex.sets.map((set,si)=>(
                <div key={si} style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 32px",gap:6,marginBottom:6,alignItems:"center"}}>
                  <div style={{fontWeight:700,fontSize:12,color:C.textMuted,textAlign:"center",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"9px 0"}}>{si+1}</div>
                  <input type="number" inputMode="decimal" value={set.type==="drop"?"(Drop)":set.reps} disabled={set.type==="drop"} onChange={e=>updateSet(ei,si,"reps",e.target.value)} style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:15,padding:"9px",opacity:set.type==="drop"?0.4:1}}/>
                  <input type="number" inputMode="decimal" value={set.type==="drop"?"(Drop)":set.weight} disabled={set.type==="drop"} placeholder="–" onChange={e=>updateSet(ei,si,"weight",e.target.value)} style={{...sc.inp,textAlign:"center",fontWeight:700,fontSize:15,padding:"9px",color:C.accent,opacity:set.type==="drop"?0.4:1}}/>
                  <button onClick={()=>removeSet(ei,si)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:14,textAlign:"center"}}
                    onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>
                </div>
              ))}
              <button onClick={()=>addSet(ei)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"7px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,marginTop:4}}>+ Satz hinzufügen</button>
            </div>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>onSave(sessionKey,{...session,date,exercises})} style={{...sc.btnP,flex:1,fontSize:14,padding:"13px"}}>Änderungen speichern</button>
          <button onClick={onClose} style={sc.btnS}>Abbrechen</button>
        </div>
      </div>
    </div>
  );
}

function Toast({msg}) {
  return msg?<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:C.accent,color:C.accentText,padding:"11px 24px",borderRadius:8,fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 24px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>{msg}</div>:null;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [templates,setTemplates]=useState(()=>LS.get("v2-templates")||[]);
  const [dayConfig,setDayConfig]=useState(()=>LS.get("v2-dayconfig")||Object.fromEntries(days.map(d=>[d,{templateId:null,customExercises:[]}])));
  const [sessions,setSessions]=useState(()=>LS.get("v2-log")||{});
  const [activeDay,setActiveDay]=useState("Montag");
  const [view,setView]=useState("plan");
  // session
  const [sessionData,setSessionData]=useState({});
  const [sessionDate,setSessionDate]=useState(todayStr());
  const [sessionExercises,setSessionExercises]=useState([]);
  const [showAddInSession,setShowAddInSession]=useState(false);
  const [newSessionEx,setNewSessionEx]=useState({name:"",muscles:[],sets:3,reps:10});
  // templates
  const [editingTpl,setEditingTpl]=useState(null);
  const [showAddExToTpl,setShowAddExToTpl]=useState(false);
  const [newTplEx,setNewTplEx]=useState({name:"",muscles:[],sets:3,reps:10});
  // plan
  const [showAddCustomEx,setShowAddCustomEx]=useState(false);
  const [newCustomEx,setNewCustomEx]=useState({name:"",muscles:[],sets:3,reps:10});
  // progress
  const [progressEx,setProgressEx]=useState(null);
  const [progressMetric,setProgressMetric]=useState("maxWeight");
  // log edit
  const [editingSession,setEditingSession]=useState(null);
  // toast
  const [toast,setToast]=useState(null);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const saveT=(v)=>{setTemplates(v);LS.set("v2-templates",v);};
  const saveDC=(v)=>{setDayConfig(v);LS.set("v2-dayconfig",v);};
  const saveS=(v)=>{setSessions(v);LS.set("v2-log",v);};
  const navTo=(v)=>{setView(v);setEditingTpl(null);};

  const getActiveEx=(day)=>{
    const cfg=dayConfig[day];
    if(cfg.templateId){const t=templates.find(t=>t.id===cfg.templateId);return t?t.exercises:[];}
    return cfg.customExercises||[];
  };

  // ── PLAN ──
  const assignTemplate=(day,tid)=>saveDC({...dayConfig,[day]:{...dayConfig[day],templateId:tid||null}});
  const addCustomEx=()=>{
    if(!newCustomEx.name.trim())return;
    saveDC({...dayConfig,[activeDay]:{...dayConfig[activeDay],customExercises:[...(dayConfig[activeDay].customExercises||[]),{...newCustomEx,id:genId()}]}});
    setNewCustomEx({name:"",muscles:[],sets:3,reps:10});setShowAddCustomEx(false);showToast("Übung hinzugefügt ✓");
  };
  const removeCustomEx=(day,id)=>saveDC({...dayConfig,[day]:{...dayConfig[day],customExercises:(dayConfig[day].customExercises||[]).filter(e=>e.id!==id)}});

  // ── SESSION ──
  const startSession=()=>{
    const exs=getActiveEx(activeDay);
    if(!exs.length)return;
    const init={};
    exs.forEach(ex=>{init[ex.id]=Array.from({length:ex.sets},()=>({reps:ex.reps,weight:"",type:"normal"}));});
    setSessionExercises(exs);setSessionData(init);setSessionDate(todayStr());setView("session");
  };

  const updateSetField=(exId,si,field,val)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    c[exId][si][field]=val;
    return c;
  });

  const toggleDropSet=(exId,si)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    const set=c[exId][si];
    if(set.type==="drop"){
      // revert to normal, take first drop's values
      const first=set.drops?.[0]||{};
      c[exId][si]={reps:first.reps||10,weight:first.weight||"",type:"normal"};
    } else {
      c[exId][si]={type:"drop",drops:[{reps:set.reps||10,weight:set.weight||""},{reps:set.reps||10,weight:""}]};
    }
    return c;
  });

  const addDropUnit=(exId,si)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    const last=c[exId][si].drops[c[exId][si].drops.length-1];
    c[exId][si].drops.push({reps:last?.reps||10,weight:""});
    return c;
  });

  const removeDropUnit=(exId,si,di)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    c[exId][si].drops=c[exId][si].drops.filter((_,i)=>i!==di);
    return c;
  });

  const updateDropField=(exId,si,di,field,val)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    c[exId][si].drops[di][field]=val;
    return c;
  });

  const addSetToEx=(exId)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    const last=c[exId][c[exId].length-1];
    c[exId].push({reps:last?.reps||10,weight:"",type:"normal"});
    return c;
  });

  const removeSetFromEx=(exId,si)=>setSessionData(prev=>{
    const c=JSON.parse(JSON.stringify(prev));
    c[exId]=c[exId].filter((_,i)=>i!==si);
    return c;
  });

  const addExInSession=()=>{
    if(!newSessionEx.name.trim())return;
    const ex={...newSessionEx,id:genId()};
    setSessionExercises(prev=>[...prev,ex]);
    setSessionData(prev=>({...prev,[ex.id]:Array.from({length:ex.sets},()=>({reps:ex.reps,weight:"",type:"normal"}))}));
    setNewSessionEx({name:"",muscles:[],sets:3,reps:10});setShowAddInSession(false);showToast("Übung hinzugefügt ✓");
  };

  const removeExInSession=(exId)=>{
    setSessionExercises(prev=>prev.filter(e=>e.id!==exId));
    setSessionData(prev=>{const c={...prev};delete c[exId];return c;});
  };

  const finishSession=()=>{
    const cfg=dayConfig[activeDay],tplName=cfg.templateId?(templates.find(t=>t.id===cfg.templateId)?.name||""):"";
    const entry={day:activeDay,date:sessionDate,templateName:tplName,
      exercises:sessionExercises.map(ex=>({name:ex.name,muscles:ex.muscles||[],sets:sessionData[ex.id]||[]}))};
    const key=`${sessionDate}-${activeDay}-${Date.now()}`;
    saveS({...sessions,[key]:entry});setView("plan");showToast("Training gespeichert 🎯");
  };

  // ── TEMPLATES ──
  const createTpl=()=>{setEditingTpl({id:genId(),name:"",exercises:[],isNew:true});setShowAddExToTpl(false);setNewTplEx({name:"",muscles:[],sets:3,reps:10});};
  const openTpl=(t)=>{setEditingTpl({...t,isNew:false});setShowAddExToTpl(false);setNewTplEx({name:"",muscles:[],sets:3,reps:10});};
  const saveTpl=()=>{
    if(!editingTpl.name.trim())return;
    const tpl={id:editingTpl.id,name:editingTpl.name,exercises:editingTpl.exercises};
    saveT(editingTpl.isNew?[...templates,tpl]:templates.map(t=>t.id===tpl.id?tpl:t));
    setEditingTpl(null);showToast("Plan gespeichert ✓");
  };
  const deleteTpl=(id)=>{
    saveT(templates.filter(t=>t.id!==id));
    const dc={...dayConfig};days.forEach(d=>{if(dc[d].templateId===id)dc[d]={...dc[d],templateId:null}});
    saveDC(dc);showToast("Plan gelöscht");
  };
  const addExToTpl=()=>{
    if(!newTplEx.name.trim())return;
    setEditingTpl(prev=>({...prev,exercises:[...prev.exercises,{...newTplEx,id:genId()}]}));
    setNewTplEx({name:"",muscles:[],sets:3,reps:10});setShowAddExToTpl(false);
  };

  // ── LOG ──
  const openEditSession=(key)=>setEditingSession({key,session:JSON.parse(JSON.stringify(sessions[key]))});
  const saveEditedSession=(key,updated)=>{saveS({...sessions,[key]:updated});setEditingSession(null);showToast("Training aktualisiert ✓");};
  const deleteSession=(key)=>{const u={...sessions};delete u[key];saveS(u);showToast("Training gelöscht");};

  // ── PROGRESS ──
  const progressData=buildProgressData(sessions);
  const exerciseNames=Object.keys(progressData).sort();
  useEffect(()=>{if(exerciseNames.length>0&&!progressEx)setProgressEx(exerciseNames[0]);},[exerciseNames.length]);
  const metricOpts=[
    {key:"maxWeight",label:"Max. Gewicht",unit:"kg",color:C.accent},
    {key:"volume",label:"Volumen",unit:"kg·Wdh",color:C.blue},
    {key:"totalReps",label:"Gesamt Wdh.",unit:"",color:C.yellow},
    {key:"setsCount",label:"Sätze",unit:"",color:C.orange},
  ];
  const selHistory=progressEx?(progressData[progressEx]||[]):[];
  const selStats=selHistory.map(h=>calcStats(h.sets));
  const sortedLog=Object.entries(sessions).sort((a,b)=>(b[1].date||"").localeCompare(a[1].date||""));

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.textPrimary,fontFamily:"-apple-system,'Inter','Segoe UI',sans-serif",fontSize:14,paddingTop:"env(safe-area-inset-top)"}}>
      <Toast msg={toast}/>
      {editingSession&&<EditSessionModal sessionKey={editingSession.key} session={editingSession.session} onSave={saveEditedSession} onClose={()=>setEditingSession(null)}/>}

      <div style={{maxWidth:680,margin:"0 auto",padding:"0 16px 120px"}}>

        {/* HEADER */}
        <div style={{padding:"28px 0 20px",borderBottom:`1px solid ${C.border}`,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.2em",color:C.accent,marginBottom:2}}>YOUR GYM COMPANION</div>
            <h1 style={{margin:0,fontSize:30,fontWeight:900,color:C.textPrimary,letterSpacing:"-0.04em"}}>Just<span style={{color:C.accent}}>Train</span></h1>
          </div>
          <div style={{fontSize:32}}>🏋️</div>
        </div>

        {/* NAV */}
        {view!=="session"&&(
          <div style={{display:"flex",gap:6,marginBottom:24,flexWrap:"wrap"}}>
            {[["plan","📋 Woche"],["templates","📁 Pläne"],["progress","📈 Fortschritt"],["log","🗓 Verlauf"]].map(([v,label])=>(
              <button key={v} onClick={()=>navTo(v)} style={{background:view===v?C.accent:C.surface,color:view===v?C.accentText:C.textSecondary,border:`1px solid ${view===v?C.accent:C.border}`,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:view===v?700:500,fontFamily:"inherit",borderRadius:8}}>{label}</button>
            ))}
          </div>
        )}

        {/* ══ PLAN VIEW ══ */}
        {view==="plan"&&(
          <div>
            <div style={{display:"flex",gap:4,marginBottom:20}}>
              {days.map((day,i)=>{
                const cnt=getActiveEx(day).length,hasTpl=!!dayConfig[day].templateId,active=activeDay===day;
                return<button key={day} onClick={()=>setActiveDay(day)} style={{flex:1,background:active?C.accent:C.surface,color:active?C.accentText:C.textMuted,border:`1px solid ${active?C.accent:C.border}`,padding:"9px 2px",cursor:"pointer",fontSize:10,fontWeight:active?800:500,fontFamily:"inherit",borderRadius:6}}>
                  {dayShort[i]}<div style={{fontSize:9,marginTop:3,color:cnt>0?(active?C.accentText:C.accent):"inherit"}}>{cnt>0?(hasTpl?"●":String(cnt)):"·"}</div>
                </button>;
              })}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div><div style={{...sc.lbl,marginBottom:4}}>Trainingstag</div><div style={{fontSize:22,fontWeight:800,color:C.textPrimary}}>{activeDay}</div></div>
              {getActiveEx(activeDay).length>0&&<button onClick={startSession} style={{...sc.btnP,fontSize:14,padding:"11px 24px"}}>▶ Training starten</button>}
            </div>
            <div style={{...sc.card,padding:"14px 16px",marginBottom:16}}>
              <div style={{...sc.lbl,marginBottom:10}}>Trainingsplan für diesen Tag</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={()=>assignTemplate(activeDay,null)} style={{background:!dayConfig[activeDay].templateId?C.surfaceHover:"transparent",color:!dayConfig[activeDay].templateId?C.textPrimary:C.textMuted,border:`1px solid ${!dayConfig[activeDay].templateId?C.borderLight:C.border}`,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:!dayConfig[activeDay].templateId?700:400}}>Individuell</button>
                {templates.map(t=><button key={t.id} onClick={()=>assignTemplate(activeDay,t.id)} style={{background:dayConfig[activeDay].templateId===t.id?C.accent:"transparent",color:dayConfig[activeDay].templateId===t.id?C.accentText:C.textSecondary,border:`1px solid ${dayConfig[activeDay].templateId===t.id?C.accent:C.border}`,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:dayConfig[activeDay].templateId===t.id?700:400}}>{t.name}</button>)}
                {templates.length===0&&<span style={{fontSize:12,color:C.textMuted,alignSelf:"center"}}>Unter „Pläne" Trainingspläne erstellen</span>}
              </div>
            </div>
            {getActiveEx(activeDay).length===0?(
              <div style={{...sc.card,padding:"40px 24px",textAlign:"center",borderStyle:"dashed"}}>
                <div style={{fontSize:32,marginBottom:10}}>＋</div>
                <div style={{color:C.textMuted,fontSize:13}}>{dayConfig[activeDay].templateId?"Dieser Plan hat keine Übungen":"Keine Übungen für diesen Tag"}</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {getActiveEx(activeDay).map((ex,i)=>(
                  <div key={ex.id} style={{...sc.card,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{...sc.lbl,marginBottom:4}}>#{String(i+1).padStart(2,"0")}</div>
                      <div style={{fontWeight:700,fontSize:15,color:C.textPrimary,marginBottom:5}}>{ex.name}</div>
                      <div style={{display:"flex",gap:12,fontSize:13,color:C.textSecondary}}>
                        <span><span style={{color:C.accent,fontWeight:700}}>{ex.sets}</span> Sätze</span>
                        <span><span style={{color:C.accent,fontWeight:700}}>{ex.reps}</span> Wdh.</span>
                      </div>
                      <MuscleTags muscles={ex.muscles}/>
                    </div>
                    {!dayConfig[activeDay].templateId&&<button onClick={()=>removeCustomEx(activeDay,ex.id)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:18,padding:"2px 6px"}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>}
                  </div>
                ))}
              </div>
            )}
            {!dayConfig[activeDay].templateId&&(
              <>
                <button onClick={()=>setShowAddCustomEx(!showAddCustomEx)} style={{marginTop:10,width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"12px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8}}>+ Übung hinzufügen</button>
                {showAddCustomEx&&<ExerciseForm ex={newCustomEx} setEx={setNewCustomEx} onSave={addCustomEx} onCancel={()=>setShowAddCustomEx(false)}/>}
              </>
            )}
          </div>
        )}

        {/* ══ TEMPLATES LIST ══ */}
        {view==="templates"&&!editingTpl&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontWeight:700,fontSize:18,color:C.textPrimary}}>Meine Trainingspläne</div>
              <button onClick={createTpl} style={sc.btnP}>+ Neuer Plan</button>
            </div>
            {templates.length===0?(
              <div style={{...sc.card,padding:"48px 24px",textAlign:"center",borderStyle:"dashed"}}>
                <div style={{fontSize:32,marginBottom:12}}>📋</div>
                <div style={{color:C.textSecondary,fontSize:14,marginBottom:4}}>Noch keine Pläne erstellt.</div>
                <div style={{color:C.textMuted,fontSize:12}}>Erstelle Pläne und weise sie den Wochentagen zu.</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {templates.map(t=>(
                  <div key={t.id} style={{...sc.card,overflow:"hidden"}}>
                    <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:15,color:C.textPrimary}}>{t.name}</div>
                        <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{t.exercises.length} Übungen</div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>openTpl(t)} style={{...sc.btnS,padding:"7px 14px",fontSize:12}}>Bearbeiten</button>
                        <button onClick={()=>deleteTpl(t.id)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,padding:"7px 11px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color=C.textMuted}>✕</button>
                      </div>
                    </div>
                    <div style={{padding:"12px 16px",display:"flex",flexWrap:"wrap",gap:6}}>
                      {t.exercises.map(ex=><span key={ex.id} style={{fontSize:12,background:C.bg,border:`1px solid ${C.border}`,padding:"4px 10px",borderRadius:6,color:C.textSecondary}}>{ex.name} <span style={{color:C.accent,fontWeight:700}}>{ex.sets}×{ex.reps}</span></span>)}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ══ TEMPLATE EDITOR ══ */}
        {view==="templates"&&editingTpl&&(
          <div>
            <button onClick={()=>setEditingTpl(null)} style={{background:"none",border:"none",color:C.textSecondary,cursor:"pointer",fontSize:13,fontFamily:"inherit",padding:0,marginBottom:16}}>← Zurück zu Plänen</button>
            <div style={{fontWeight:700,fontSize:18,color:C.textPrimary,marginBottom:16}}>{editingTpl.isNew?"Neuer Trainingsplan":"Plan bearbeiten"}</div>
            <input placeholder="Planname (z.B. Push Day, Leg Day...)" value={editingTpl.name} onChange={e=>setEditingTpl(p=>({...p,name:e.target.value}))} style={{...sc.inp,marginBottom:16,fontSize:16,fontWeight:700}}/>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
              {editingTpl.exercises.map(ex=>(
                <div key={ex.id} style={{...sc.card,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.textPrimary,marginBottom:4}}>{ex.name}</div>
                    <div style={{fontSize:12,color:C.textSecondary}}><span style={{color:C.accent,fontWeight:700}}>{ex.sets}</span> Sätze · <span style={{color:C.accent,fontWeight:700}}>{ex.reps}</span> Wdh.</div>
                    <MuscleTags muscles={ex.muscles} small/>
                  </div>
                  <button onClick={()=>setEditingTpl(p=>({...p,exercises:p.exercises.filter(e=>e.id!==ex.id)}))} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:18,padding:"2px 6px"}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>
                </div>
              ))}
            </div>
            <button onClick={()=>setShowAddExToTpl(!showAddExToTpl)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"12px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,marginBottom:12}}>+ Übung hinzufügen</button>
            {showAddExToTpl&&<ExerciseForm ex={newTplEx} setEx={setNewTplEx} onSave={addExToTpl} onCancel={()=>setShowAddExToTpl(false)}/>}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={saveTpl} style={{...sc.btnP,flex:1,fontSize:14}}>Plan speichern</button>
              <button onClick={()=>setEditingTpl(null)} style={sc.btnS}>Abbrechen</button>
            </div>
          </div>
        )}

        {/* ══ SESSION VIEW ══ */}
        {view==="session"&&(
          <div style={{paddingTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{...sc.lbl,color:C.accent,marginBottom:4}}>Aktives Training</div>
                <div style={{fontSize:22,fontWeight:800,color:C.textPrimary}}>{activeDay}</div>
                {dayConfig[activeDay].templateId&&templates.find(t=>t.id===dayConfig[activeDay].templateId)&&<div style={{fontSize:13,color:C.textSecondary,marginTop:2}}>{templates.find(t=>t.id===dayConfig[activeDay].templateId).name}</div>}
              </div>
              <button onClick={()=>setView("plan")} style={{...sc.btnS,padding:"8px 14px"}}>✕ Abbrechen</button>
            </div>
            <div style={{...sc.card,padding:"14px 16px",marginBottom:20}}>
              <div style={{...sc.lbl,marginBottom:8}}>Datum des Trainings</div>
              <input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} style={{...sc.inp,colorScheme:"dark",fontSize:15,fontWeight:700}}/>
            </div>

            {sessionExercises.map((ex,ei)=>(
              <div key={ex.id} style={{...sc.card,marginBottom:14,padding:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                  <div style={{flex:1}}>
                    <div style={{...sc.lbl,marginBottom:3}}>#{String(ei+1).padStart(2,"0")}</div>
                    <div style={{fontWeight:700,fontSize:16,color:C.textPrimary}}>{ex.name}</div>
                    <MuscleTags muscles={ex.muscles} small/>
                  </div>
                  <button onClick={()=>removeExInSession(ex.id)} style={{background:C.redDim,border:`1px solid ${C.red}`,color:C.red,cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,padding:"5px 9px",flexShrink:0,marginLeft:8}}>entfernen</button>
                </div>

                {/* Column headers */}
                <div style={{display:"grid",gridTemplateColumns:"36px 1fr auto auto",gap:6,marginBottom:6}}>
                  <div style={{...sc.lbl,textAlign:"center",fontSize:9}}>Satz</div>
                  <div style={{...sc.lbl,fontSize:9}}>Wdh. / Gewicht</div>
                  <div style={{...sc.lbl,fontSize:9}}>Drop</div>
                  <div/>
                </div>

                {(sessionData[ex.id]||[]).map((set,si)=>(
                  <SetRow key={si}
                    set={set} setIdx={si}
                    onUpdate={(field,val)=>updateSetField(ex.id,si,field,val)}
                    onRemove={()=>removeSetFromEx(ex.id,si)}
                    onToggleDrop={()=>toggleDropSet(ex.id,si)}
                    onAddDrop={()=>addDropUnit(ex.id,si)}
                    onRemoveDrop={(di)=>removeDropUnit(ex.id,si,di)}
                    onUpdateDrop={(di,field,val)=>updateDropField(ex.id,si,di,field,val)}
                  />
                ))}
                <button onClick={()=>addSetToEx(ex.id)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"8px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,marginTop:4}}>+ Satz hinzufügen</button>
              </div>
            ))}

            <button onClick={()=>setShowAddInSession(!showAddInSession)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"12px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,marginBottom:12}}>+ Übung hinzufügen</button>
            {showAddInSession&&<ExerciseForm ex={newSessionEx} setEx={setNewSessionEx} onSave={addExInSession} onCancel={()=>setShowAddInSession(false)} title="Übung zum Training hinzufügen"/>}

            <button onClick={finishSession} style={{width:"100%",background:C.accent,color:C.accentText,border:"none",padding:"16px",cursor:"pointer",fontSize:15,fontWeight:800,fontFamily:"inherit",borderRadius:8,marginTop:4}}>✓ Training abschließen</button>
          </div>
        )}

        {/* ══ PROGRESS VIEW ══ */}
        {view==="progress"&&(
          <div>
            <div style={{fontWeight:700,fontSize:18,color:C.textPrimary,marginBottom:6}}>Fortschritt</div>
            <div style={{fontSize:13,color:C.textSecondary,marginBottom:20}}>Deine Entwicklung über alle Trainings.</div>
            {exerciseNames.length===0?(
              <div style={{...sc.card,padding:"48px 24px",textAlign:"center",borderStyle:"dashed"}}>
                <div style={{fontSize:32,marginBottom:12}}>📈</div>
                <div style={{color:C.textSecondary,fontSize:14,marginBottom:4}}>Noch keine Daten.</div>
                <div style={{color:C.textMuted,fontSize:12}}>Schließe Trainings ab, um deinen Fortschritt zu sehen.</div>
              </div>
            ):(
              <>
                <div style={{...sc.card,padding:"14px 16px",marginBottom:16}}>
                  <div style={{...sc.lbl,marginBottom:10}}>Übung auswählen</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {exerciseNames.map(name=><button key={name} onClick={()=>setProgressEx(name)} style={{background:progressEx===name?C.accent:C.surfaceHover,color:progressEx===name?C.accentText:C.textSecondary,border:`1px solid ${progressEx===name?C.accent:C.border}`,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:progressEx===name?700:400}}>{name}</button>)}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
                  {metricOpts.map(m=><button key={m.key} onClick={()=>setProgressMetric(m.key)} style={{background:progressMetric===m.key?m.color:C.surface,color:progressMetric===m.key?C.accentText:C.textSecondary,border:`1px solid ${progressMetric===m.key?m.color:C.border}`,padding:"7px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:progressMetric===m.key?700:400}}>{m.label}</button>)}
                </div>
                {progressEx&&selHistory.length>0&&(()=>{
                  const metric=metricOpts.find(m=>m.key===progressMetric);
                  const values=selStats.map(s=>s[progressMetric]);
                  const first=values[0],last=values[values.length-1],max=Math.max(...values);
                  return(
                    <>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                        {[
                          {label:"Erster Wert",value:`${first}${metric.unit?" "+metric.unit:""}`,sub:fmtDate(selHistory[0].date)},
                          {label:"Aktuell",value:`${last}${metric.unit?" "+metric.unit:""}`,sub:fmtDate(selHistory[selHistory.length-1].date),hi:true},
                          {label:"Bestleistung",value:`${max}${metric.unit?" "+metric.unit:""}`,sub:`${selHistory.length} Einh.`},
                        ].map((card,ci)=>(
                          <div key={ci} style={{...sc.card,padding:"14px",background:card.hi?C.accentDim:C.surface,border:`1px solid ${card.hi?C.accent:C.border}`}}>
                            <div style={{...sc.lbl,marginBottom:6,color:card.hi?C.accent:C.textMuted}}>{card.label}</div>
                            <div style={{fontWeight:800,fontSize:17,color:card.hi?C.accent:C.textPrimary}}>{card.value}</div>
                            <div style={{fontSize:11,color:C.textMuted,marginTop:3}}>{card.sub}</div>
                          </div>
                        ))}
                      </div>
                      {values.length>=2&&(
                        <div style={{...sc.card,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                          <div style={{fontSize:13,color:C.textSecondary}}>Gesamtentwicklung:</div>
                          <TrendBadge first={first} last={last}/>
                          <div style={{fontSize:12,color:C.textMuted}}>{last>first?`+${last-first} ${metric.unit} seit Beginn`:last<first?`${last-first} ${metric.unit} seit Beginn`:"Keine Veränderung"}</div>
                        </div>
                      )}
                      {values.length>=2&&(
                        <div style={{...sc.card,padding:"20px",marginBottom:16}}>
                          <div style={{...sc.lbl,marginBottom:16}}>{metric.label} über Zeit</div>
                          <ProgressChart data={values} dates={selHistory.map(h=>h.date)} color={metric.color} unit={metric.unit}/>
                        </div>
                      )}
                      <div style={{...sc.card,overflow:"hidden",marginBottom:16}}>
                        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,...sc.lbl}}>Alle Einheiten — {progressEx}</div>
                        {[...selHistory].reverse().map((session,idx)=>{
                          const stat=calcStats(session.sets);
                          const prevIdx=selHistory.length-2-idx;
                          const prev=prevIdx>=0?calcStats(selHistory[prevIdx].sets):null;
                          return(
                            <div key={idx} style={{padding:"12px 16px",borderBottom:idx<selHistory.length-1?`1px solid ${C.border}`:"none",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                              <div>
                                <div style={{fontWeight:600,fontSize:13,color:C.textPrimary,marginBottom:4}}>{fmtDate(session.date)}</div>
                                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                  {session.sets.map((set,si)=><SetDisplay key={si} set={set} si={si}/>)}
                                </div>
                              </div>
                              <div style={{textAlign:"right",minWidth:90}}>
                                <div style={{fontSize:15,fontWeight:800,color:C.textPrimary}}>{stat.maxWeight>0?`${stat.maxWeight} kg`:"–"}</div>
                                <div style={{fontSize:11,color:C.textMuted}}>{stat.setsCount} × {stat.avgReps} Wdh.</div>
                                {prev&&stat.maxWeight>0&&prev.maxWeight>0&&stat.maxWeight!==prev.maxWeight&&(
                                  <span style={{fontSize:10,fontWeight:700,color:stat.maxWeight>prev.maxWeight?C.accent:C.red}}>{stat.maxWeight>prev.maxWeight?"▲":"▼"} {Math.abs(stat.maxWeight-prev.maxWeight)} kg</span>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <MusclePanel sessions={sessions}/>
                    </>
                  );
                })()}
                {progressEx&&selHistory.length===0&&<div style={{...sc.card,padding:"32px",textAlign:"center",color:C.textMuted,fontSize:13}}>Keine Daten für diese Übung.</div>}
              </>
            )}
          </div>
        )}

        {/* ══ LOG VIEW ══ */}
        {view==="log"&&(
          <div>
            <div style={{fontWeight:700,fontSize:18,color:C.textPrimary,marginBottom:20}}>Trainingsverlauf</div>
            {sortedLog.length===0?(
              <div style={{...sc.card,padding:"48px 24px",textAlign:"center",borderStyle:"dashed"}}>
                <div style={{fontSize:32,marginBottom:12}}>🗓</div>
                <div style={{color:C.textSecondary,fontSize:14}}>Noch keine abgeschlossenen Trainings</div>
              </div>
            ):(()=>{
              const weeks={};
              sortedLog.forEach(([key,session])=>{const wk=getWeekLabel(session.date);if(!weeks[wk])weeks[wk]=[];weeks[wk].push([key,session]);});
              return Object.entries(weeks).map(([week,entries])=>(
                <div key={week} style={{marginBottom:28}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",color:C.accent,marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>KW · {week}</div>
                  {entries.map(([key,session])=>(
                    <div key={key} style={{...sc.card,marginBottom:10,overflow:"hidden"}}>
                      <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14,color:C.textPrimary}}>{session.day}</div>
                          {session.templateName&&<div style={{fontSize:11,color:C.accent,marginTop:2}}>{session.templateName}</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{fontSize:12,color:C.textSecondary}}>{fmtDate(session.date)}</div>
                          <button onClick={()=>openEditSession(key)} style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textSecondary,padding:"5px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6}}>✏️ Bearbeiten</button>
                          <button onClick={()=>{if(confirm("Training löschen?"))deleteSession(key);}} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,padding:"5px 9px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color=C.textMuted}>✕</button>
                        </div>
                      </div>
                      <div style={{padding:"12px 16px"}}>
                        {(session.exercises||[]).map((ex,i)=>(
                          <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<(session.exercises.length-1)?`1px solid ${C.border}`:"none"}}>
                            <div style={{fontSize:12,fontWeight:700,color:C.textSecondary,marginBottom:6}}>{ex.name}</div>
                            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                              {(ex.sets||[]).map((set,si)=><SetDisplay key={si} set={set} si={si}/>)}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ));
            })()}
          </div>
        )}

      </div>

      {/* Bottom tab bar */}
      {view!=="session"&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)",zIndex:100}}>
          {[["plan","📋","Woche"],["templates","📁","Pläne"],["progress","📈","Fortschritt"],["log","🗓","Verlauf"]].map(([v,icon,label])=>(
            <button key={v} onClick={()=>navTo(v)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>{icon}</span>
              <span style={{fontSize:10,fontWeight:view===v?700:400,color:view===v?C.accent:C.textMuted}}>{label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
