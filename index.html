  <script>
  // ── PWA: generate icons via canvas & inject manifest ────────────────────────
  (function(){
    function makeIcon(size,bg,fg){
      const c=document.createElement('canvas');c.width=c.height=size;
      const ctx=c.getContext('2d');
      // background with rounded rect
      const r=size*0.22;
      ctx.fillStyle=bg;
      ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
      ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
      ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
      ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
      // dumbbell icon
      const cx=size/2,cy=size/2,bw=size*0.52,bh=size*0.11,pw=size*0.13,ph=size*0.32;
      ctx.fillStyle=fg;
      // bar
      ctx.fillRect(cx-bw/2,cy-bh/2,bw,bh);
      // left plates
      ctx.fillRect(cx-bw/2-pw,cy-ph/2,pw,ph);
      ctx.fillRect(cx-bw/2-pw*1.8,cy-ph*0.7/2,pw*0.7,ph*0.7);
      // right plates
      ctx.fillRect(cx+bw/2,cy-ph/2,pw,ph);
      ctx.fillRect(cx+bw/2+pw,cy-ph*0.7/2,pw*0.7,ph*0.7);
      // accent dot
      ctx.fillStyle=fg==='#7ee8a2'?'#fff':fg;
      ctx.beginPath();ctx.arc(cx,cy,size*0.06,0,Math.PI*2);ctx.fill();
      return c.toDataURL('image/png');
    }
    const iconDark=makeIcon(512,'#111318','#7ee8a2');
    const iconLight=makeIcon(512,'#7ee8a2','#111318');
    // set apple touch icon
    document.getElementById('appleTouchIcon').href=iconDark;
    document.getElementById('faviconLink').href=makeIcon(64,'#111318','#7ee8a2');
    window._iconDark=iconDark;window._iconLight=iconLight;
    // inject web manifest
    const manifest={
      name:'JustTrain',short_name:'JustTrain',
      description:'Dein persönlicher Gym-Companion',
      start_url:'.',display:'standalone',
      orientation:'portrait',
      background_color:'#111318',theme_color:'#111318',
      icons:[
        {src:iconDark,sizes:'512x512',type:'image/png',purpose:'any maskable'},
        {src:iconDark,sizes:'192x192',type:'image/png'}
      ]
    };
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('link');
    link.rel='manifest';link.href=url;
    document.head.appendChild(link);
    // register service worker for offline support
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        // inline SW as blob
        const swCode=`
const CACHE='justtrain-v1';
const ASSETS=[self.location.href.replace('/sw.js','/')];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(res&&res.status===200&&res.type==='basic'){
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
    }
    return res;
  }).catch(()=>caches.match(e.request))));
});`;
        const swBlob=new Blob([swCode],{type:'text/javascript'});
        const swUrl=URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(()=>{});
      });
    }
  })();
  </script>

// Get parent muscle group for a list of muscles
function getParentGroup(muscles){
  if(!muscles||!muscles.length)return"Sonstige";
  for(const m of muscles){
    const g=MUSCLE_TREE.find(g=>g.key===m||g.children.includes(m));
    if(g)return g.key;
  }
  return"Sonstige";
}

// Group exercises by primary muscle category
function groupExercisesByMuscle(exercises){
  const grouped={};
  exercises.forEach((ex,origIdx)=>{
    const parent=getParentGroup(ex.muscles);
    if(!grouped[parent])grouped[parent]=[];
    grouped[parent].push({ex,origIdx});
  });
  return grouped;
}

// Parse weight: "4x25" or "4×25" → {display:"4×25 kg", total:100}; "50" → {display:"50 kg", total:50}
function parseWeight(raw){
  if(raw===undefined||raw===null||raw==="")return{display:"–",total:0};
  const str=String(raw).trim();
  const multi=/^(\d+(?:[.,]\d+)?)\s*[xX×]\s*(\d+(?:[.,]\d+)?)$/.exec(str);
  if(multi){
    const count=parseFloat(multi[1].replace(",","."));
    const each=parseFloat(multi[2].replace(",","."));
    return{display:`${multi[1]}×${multi[2]} kg`,total:count*each};
  }
  const num=parseFloat(str.replace(",","."));
  return{display:isNaN(num)?"–":`${str} kg`,total:isNaN(num)?0:num};
}

function calcStats(sets){
  const work=(sets||[]).filter(s=>s.setType!=="warmup").map(s=>{
    if(s.type==="drop"&&s.drops){
      const mw=Math.max(0,...s.drops.map(d=>parseWeight(d.weight).total));
      const tr=s.drops.reduce((a,d)=>a+(parseInt(d.reps)||0),0);
      return{reps:tr,weight:mw};
    }
    return{reps:s.reps,weight:parseWeight(s.weight).total};
  }).filter(s=>s.reps>0);
  const vol=Math.round(work.reduce((a,s)=>a+(s.weight||0)*(parseInt(s.reps)||0),0));
  const mw=Math.max(0,...work.map(s=>s.weight||0));
  const tr=work.reduce((a,s)=>a+(parseInt(s.reps)||0),0);
  const ar=work.length>0?Math.round(tr/work.length):0;
  return{volume:vol,maxWeight:mw,totalReps:tr,setsCount:work.length,avgReps:ar};
}

function buildProgressData(sessions){
  const byEx={};
  Object.values(sessions).forEach(s=>(s.exercises||[]).forEach(ex=>{
    if(!byEx[ex.name])byEx[ex.name]=[];
    const flatSets=(ex.sets||[]).filter(s=>s.setType!=="warmup").map(s=>{
      if(s.type==="drop"&&s.drops){
        return{reps:s.drops.reduce((a,d)=>a+(parseInt(d.reps)||0),0),weight:Math.max(0,...s.drops.map(d=>parseWeight(d.weight).total))};
      }
      return{reps:s.reps,weight:parseWeight(s.weight).total};
    });
    byEx[ex.name].push({date:s.date,sets:flatSets});
  }));
  Object.keys(byEx).forEach(n=>byEx[n].sort((a,b)=>(a.date||"").localeCompare(b.date||"")));
  return byEx;
}

function getWeekLabel(dateStr){
  if(!dateStr)return"Unbekannt";
  const d=new Date(dateStr),st=new Date(d);
  st.setDate(d.getDate()-((d.getDay()+6)%7));
  const en=new Date(st);en.setDate(st.getDate()+6);
  return`${fmtDate(st.toISOString().split("T")[0])} – ${fmtDate(en.toISOString().split("T")[0])}`;
}

function getWeekStart(dateStr){
  const d=new Date(dateStr),st=new Date(d);
  st.setDate(d.getDate()-((d.getDay()+6)%7));
  return st.toISOString().split("T")[0];
}

function MusclePicker({selected,onChange}){
  const [open,setOpen]=useState({});
  const toggle=(m)=>onChange(selected.includes(m)?selected.filter(x=>x!==m):[...selected,m]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {MUSCLE_TREE.map(g=>{
        const pOn=selected.includes(g.key),cOn=g.children.some(c=>selected.includes(c)),anyOn=pOn||cOn;
        return(
          <div key={g.key}>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>toggle(g.key)} style={{flex:1,background:pOn?C.accent:C.surfaceHover,color:pOn?C.accentText:C.textSecondary,border:`1px solid ${pOn?C.accent:anyOn?C.borderLight:C.border}`,padding:"7px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:pOn?700:500,textAlign:"left",display:"flex",justifyContent:"space-between"}}>
                <span>{g.key}</span>
                {cOn&&!pOn&&<span style={{fontSize:10,color:C.accent,fontWeight:700}}>{g.children.filter(c=>selected.includes(c)).length} ✓</span>}
              </button>
              <button onClick={()=>setOpen(p=>({...p,[g.key]:!p[g.key]}))} style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textMuted,padding:"7px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,minWidth:34}}>{open[g.key]?"▲":"▼"}</button>
            </div>
            {open[g.key]&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:5,paddingLeft:10}}>
                {g.children.map(m=><button key={m} onClick={()=>toggle(m)} style={{background:selected.includes(m)?C.accent:C.bg,color:selected.includes(m)?C.accentText:C.textMuted,border:`1px solid ${selected.includes(m)?C.accent:C.border}`,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:20,fontWeight:selected.includes(m)?700:400}}>{m}</button>)}

}

// ── PAUSE TIMER ──────────────────────────────────────────────────────────────
function PauseTimer({duration,onDone,onSkip}){
  const [left,setLeft]=useState(duration);
  const ref=useRef(null);
  useEffect(()=>{
    ref.current=setInterval(()=>{
      setLeft(p=>{if(p<=1){clearInterval(ref.current);onDone();return 0;}return p-1;});
    },1000);
    return()=>clearInterval(ref.current);
  },[]);
  const pct=(left/duration)*100;
  const r=42,circ=2*Math.PI*r;
  const mins=Math.floor(left/60),secs=left%60;
  return(
    <div style={{...sc.card,padding:"20px",marginBottom:14,display:"flex",flexDirection:"column",alignItems:"center",gap:12,background:C.accentDim,border:`1px solid ${C.accent}`}}>
      <div style={{...sc.lbl,color:C.accent}}>Pause</div>
      <div style={{position:"relative",width:100,height:100}}>
        <svg width="100" height="100" style={{transform:"rotate(-90deg)"}}>
          <circle cx="50" cy="50" r={r} fill="none" stroke={C.border} strokeWidth="6"/>
          <circle cx="50" cy="50" r={r} fill="none" stroke={C.accent} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset .9s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:C.accent}}>{mins>0?`${mins}:${String(secs).padStart(2,"0")}`:secs}</div>
      </div>
      <button onClick={onSkip} style={{...sc.btnS,fontSize:12,padding:"8px 20px"}}>Überspringen</button>
    </div>
  );
}

// ── CHARTS ───────────────────────────────────────────────────────────────────
function LineChart({data,dates,color,unit}){
  if(data.length<2)return null;
  const w=600,h=130,pl=44,pr=10,pt=8,pb=28;
  const iw=w-pl-pr,ih=h-pt-pb;
  const mn=Math.min(...data)*0.95,mx=Math.max(...data)*1.05||1,rng=mx-mn||1;
  const pts=data.map((v,i)=>({x:pl+(i/(data.length-1))*iw,y:pt+ih-((v-mn)/rng)*ih,v,d:dates[i]}));
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
  const area=`M${pts[0].x},${pt+ih} `+pts.map(p=>`L${p.x},${p.y}`).join(" ")+` L${pts[pts.length-1].x},${pt+ih} Z`;
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",maxWidth:w,display:"block"}}>
        <defs><linearGradient id={`g${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0.02"/></linearGradient></defs>
        {Array.from({length:5},(_,i)=>{const y=pt+(i/4)*ih,val=mx-(i/4)*rng;return React.createElement("g",{key:i},React.createElement("line",{x1:pl,y1:y,x2:pl+iw,y2:y,stroke:C.border,strokeWidth:"1"}),React.createElement("text",{x:pl-5,y:y+4,textAnchor:"end",fontSize:"10",fill:C.textMuted},Math.round(val)));})}
        {pts.filter((_,i)=>data.length<=8||i%(Math.ceil(data.length/6))===0||i===data.length-1).map((p,i)=>React.createElement("text",{key:i,x:p.x,y:h-4,textAnchor:"middle",fontSize:"9",fill:C.textMuted},fmtDate(p.d)))}
        <path d={area} fill={`url(#g${color.replace("#","")})`}/>
        <polyline points={poly} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>React.createElement("circle",{key:i,cx:p.x,cy:p.y,r:i===pts.length-1?5:3.5,fill:color,stroke:C.surface,strokeWidth:"2"},React.createElement("title",null,`${fmtDate(p.d)}: ${p.v} ${unit}`)))}
      </svg>
    </div>
  );
}

function TrendBadge({first,last}){
  if(first===undefined||last===undefined||first===last)return null;
  const diff=last-first,pct=first>0?Math.round((diff/first)*100):0,up=diff>0;
  return<span style={{fontSize:11,fontWeight:700,color:up?C.accent:C.red,background:up?C.accentDim:C.redDim,padding:"2px 8px",borderRadius:20}}>{up?"▲":"▼"} {Math.abs(pct)}%</span>;
}

// ── FREQUENCY CALENDAR ───────────────────────────────────────────────────────
function FreqCalendar({sessions}){
  const [month,setMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()}});
  const trained=new Set(Object.values(sessions).map(s=>s.date));
  const firstDay=new Date(month.y,month.m,1);
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const startDow=(firstDay.getDay()+6)%7; // Mon=0
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const monthNames=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const today=todayStr();
  return(
    <div style={{...sc.card,padding:"16px",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <button onClick={()=>setMonth(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:"4px 8px"}}>‹</button>
        <div style={{fontSize:14,fontWeight:700,color:C.textPrimary}}>{monthNames[month.m]} {month.y}</div>
        <button onClick={()=>setMonth(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:"4px 8px"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:C.textMuted,fontWeight:700,padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const iso=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const done=trained.has(iso);
          const isToday=iso===today;
          return<div key={i} style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,background:done?C.accentDim:C.bg,border:`1px solid ${isToday?C.accent:done?C.accent+"44":C.border}`,fontSize:12,fontWeight:done?700:400,color:done?C.accent:isToday?C.textSecondary:C.textMuted}}>{d}</div>;
        })}
      </div>
      <div style={{display:"flex",gap:12,marginTop:12,fontSize:11,color:C.textMuted}}>
        <span><span style={{color:C.accent,fontWeight:700}}>■</span> Training</span>
        <span style={{marginLeft:"auto"}}>Gesamt: <span style={{color:C.accent,fontWeight:700}}>{cells.filter(d=>{if(!d)return false;const iso=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;return trained.has(iso);}).length}</span> Einheiten</span>
      </div>
    </div>
  );
}

// ── WEEKLY VOLUME CHART ──────────────────────────────────────────────────────
function WeeklyVolumeChart({sessions}){
  const weeks={};
  Object.values(sessions).forEach(s=>{
    const ws=getWeekStart(s.date||todayStr());
    if(!weeks[ws])weeks[ws]=0;
    (s.exercises||[]).forEach(ex=>(ex.sets||[]).filter(set=>set.setType!=="warmup").forEach(set=>{
      if(set.type==="drop"&&set.drops)weeks[ws]+=set.drops.reduce((a,d)=>a+parseWeight(d.weight).total*(parseInt(d.reps)||0),0);
      else weeks[ws]+=parseWeight(set.weight).total*(parseInt(set.reps)||0);
    }));
  });
  const sorted=Object.entries(weeks).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12);
  if(sorted.length<2)return null;
  const data=sorted.map(([,v])=>Math.round(v));
  const dates=sorted.map(([k])=>k);
  return(
    <div style={{...sc.card,padding:"16px 16px 12px",marginBottom:16}}>
      <div style={{...sc.lbl,marginBottom:12}}>Wöchentliches Trainingsvolumen (kg·Wdh)</div>
      <LineChart data={data} dates={dates} color={C.blue} unit="kg·Wdh"/>
    </div>
  );
}

// ── MUSCLE PANEL ─────────────────────────────────────────────────────────────
function MusclePanel({sessions}){
  const mv={};
  Object.values(sessions).forEach(s=>(s.exercises||[]).forEach(ex=>(ex.muscles||[]).forEach(m=>{
    if(!mv[m])mv[m]=0;
    mv[m]+=(ex.sets||[]).filter(s=>s.setType!=="warmup").reduce((a,set)=>{
      if(set.type==="drop"&&set.drops)return a+set.drops.reduce((b,d)=>b+parseWeight(d.weight).total*(parseInt(d.reps)||0),0);
      return a+parseWeight(set.weight).total*(parseInt(set.reps)||0);
    },0);
  })));
  const sorted=Object.entries(mv).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)return null;
  const maxV=sorted[0][1];
  return(
    <div style={{...sc.card,overflow:"hidden",marginBottom:16}}>

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login"); // login | register
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [showPw,setShowPw]=useState(false);

  const submit=async()=>{
    setError("");
    if(!email.trim()||!password.trim())return setError("Bitte E-Mail und Passwort eingeben.");
    if(mode==="register"&&password.length<6)return setError("Passwort muss mindestens 6 Zeichen haben.");
    setLoading(true);
    try{
      if(mode==="login"){await DB.signIn(email.trim(),password);}
      else{await DB.signUp(email.trim(),password,name.trim());}
      // onAuth will fire via onAuthStateChange
    }catch(e){
      setError(e.message||"Fehler beim Anmelden.");
    }finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"-apple-system,'Inter','Segoe UI',sans-serif"}}>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{fontSize:48,marginBottom:12}}>🏋️</div>
        <h1 style={{margin:0,fontSize:32,fontWeight:900,color:C.textPrimary,letterSpacing:"-0.04em"}}>Just<span style={{color:C.accent}}>Train</span></h1>
        <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.2em",color:C.textMuted,marginTop:4}}>YOUR GYM COMPANION</div>
      </div>

      {/* Card */}
      <div style={{...sc.card,width:"100%",maxWidth:400,padding:"28px 24px"}}>
        {/* Tabs */}
        <div style={{display:"flex",background:C.bg,borderRadius:8,padding:3,marginBottom:24}}>
          {[["login","Anmelden"],["register","Registrieren"]].map(([m,label])=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}}
              style={{flex:1,background:mode===m?C.accent:"transparent",color:mode===m?C.accentText:C.textMuted,border:"none",padding:"9px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",borderRadius:6,transition:"all .15s"}}>
              {label}
            </button>
          ))}
        </div>

        {mode==="register"&&(
          <div style={{marginBottom:14}}>
            <div style={{...sc.lbl,marginBottom:6}}>Name (optional)</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Dein Name" style={sc.inp}/>
          </div>
        )}

        <div style={{marginBottom:14}}>
          <div style={{...sc.lbl,marginBottom:6}}>E-Mail</div>
          <input type="email" inputMode="email" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            placeholder="name@beispiel.de" style={sc.inp} autoComplete="email"/>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{...sc.lbl,marginBottom:6}}>Passwort</div>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&submit()}
              placeholder={mode==="register"?"Mindestens 6 Zeichen":"Dein Passwort"}
              style={{...sc.inp,paddingRight:44}} autoComplete={mode==="login"?"current-password":"new-password"}/>
            <button onClick={()=>setShowPw(p=>!p)}
              style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:0}}>
              {showPw?"🙈":"👁"}
            </button>
          </div>
        </div>

        {error&&(
          <div style={{background:C.redDim,border:`1px solid ${C.red}`,borderRadius:6,padding:"10px 12px",fontSize:12,color:C.red,marginBottom:16}}>{error}</div>
        )}

        <button onClick={submit} disabled={loading}
          style={{...sc.btnP,width:"100%",fontSize:15,padding:"13px",opacity:loading?.6:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading&&<span style={{animation:"timerPulse 1s infinite"}}>⏳</span>}
          {loading?"Bitte warten…":mode==="login"?"Anmelden →":"Konto erstellen →"}
        </button>
      </div>

      <div style={{marginTop:16,fontSize:12,color:C.textMuted,textAlign:"center"}}>
        Deine Daten werden sicher in der Cloud gespeichert.<br/>Kein Gerät gebunden — überall verfügbar.
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  // ─ AUTH ─
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);

  useEffect(()=>{
    // Listen for auth state changes
    const{data:{subscription}}=DB.onAuthChange(async(session)=>{
      if(session?.user){
        setUser(session.user);
        await loadAllData(session.user.id);
      } else {
        setUser(null);
      }
      setAuthLoading(false);
    });
    // Check existing session on mount
    DB.getSession().then(session=>{
      if(!session){setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ─ persistent state ─
  const [templates,setTemplates]=useState([]);
  const [dayConfig,setDayConfig]=useState(Object.fromEntries(DAYS.map(d=>[d,{templateId:null,customExercises:[],restDay:false}])));
  const [sessions,setSessions]=useState({});
  const [bodyWeight,setBodyWeight]=useState([]);
  const [library,setLibrary]=useState([]);
  const [settings,setSettings]=useState({timerEnabled:false,timerDuration:90});
  const [darkMode,setDarkMode]=useState(()=>LS.get("jt-darkmode")!==false);
  const [dataLoading,setDataLoading]=useState(false);

  // Load all data from Supabase
  const loadAllData=async(uid)=>{
    setDataLoading(true);
    try{
      const[tpls,dc,sess,bw,lib,sett]=await Promise.all([
        DB.getTemplates(uid),
        DB.getDayConfig(uid),
        DB.getSessions(uid),
        DB.getBodyWeight(uid),
        DB.getLibrary(uid),
        DB.getSettings(uid),
      ]);
      setTemplates(tpls);
      setDayConfig(dc);
      setSessions(sess);
      setBodyWeight(bw);
      setLibrary(lib);
      if(sett){
        setSettings({timerEnabled:sett.timerEnabled,timerDuration:sett.timerDuration});
        if(sett.darkMode!==undefined)setDarkMode(sett.darkMode);
      }
    }catch(e){console.error("Load error:",e);}
    finally{setDataLoading(false);}
  };

  // Sync theme whenever darkMode changes
  useEffect(()=>{
    C=makeColors(darkMode);
    document.body.classList.toggle("light",!darkMode);
    document.body.style.background=C.bg;
    const meta=document.getElementById("themeColorMeta");
    if(meta)meta.content=C.bg;
    LS.set("jt-darkmode",darkMode);
    if(uid)DB.upsertSettings(uid,{...settings,darkMode}).catch(()=>{});
  },[darkMode]);
  // ─ ui state ─
  const [activeDay,setActiveDay]=useState("Montag");
  const [view,setView]=useState("plan");
  const [progressTab,setProgressTab]=useState("exercise"); // exercise|calendar|weekly|body
  // session
  const [sessionData,setSessionData]=useState({});
  const [sessionDate,setSessionDate]=useState(todayStr);
  const [sessionExercises,setSessionExercises]=useState([]);
  const [sessionNotes,setSessionNotes]=useState("");
  const [showAddInSession,setShowAddInSession]=useState(false);
  const [newSessionEx,setNewSessionEx]=useState({name:"",muscles:[],sets:3,reps:10});
  const [activeTimer,setActiveTimer]=useState(null); // null | {exId, si}
  // templates
  const [editingTpl,setEditingTpl]=useState(null);
  const [showAddExToTpl,setShowAddExToTpl]=useState(false);
  const [newTplEx,setNewTplEx]=useState({name:"",muscles:[],sets:3,reps:10});
  const [editingTplExIdx,setEditingTplExIdx]=useState(null); // index of exercise being edited inline
  const [editingTplExForm,setEditingTplExForm]=useState(null); // form data for inline edit
  // plan
  const [showAddCustomEx,setShowAddCustomEx]=useState(false);
  const [newCustomEx,setNewCustomEx]=useState({name:"",muscles:[],sets:3,reps:10});
  // progress
  const [progressEx,setProgressEx]=useState(null);
  const [progressMetric,setProgressMetric]=useState("maxWeight");
  // modals
  const [editingSession,setEditingSession]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showLibrary,setShowLibrary]=useState(false);
  // pr
  const [prPopup,setPrPopup]=useState(null);
  // toast
  const [toast,setToast]=useState(null);
  // PWA install
  const [installPrompt,setInstallPrompt]=useState(null);

  useEffect(()=>{
    const handler=(e)=>{e.preventDefault();setInstallPrompt(e);};
    window.addEventListener('beforeinstallprompt',handler);
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const uid=user?.id;

  // ─ SAVE HELPERS (Supabase + local state) ─
  const saveT=async(v)=>{
    setTemplates(v);
    // Note: individual template upserts happen in createTpl/saveTpl/deleteTpl
  };
  const saveDC=async(v,changedDay)=>{
    setDayConfig(v);
    if(uid&&changedDay){
      try{await DB.upsertDayConfig(uid,changedDay,v[changedDay]);}catch(e){console.error(e);}
    } else if(uid){
      // sync all days
      try{await Promise.all(DAYS.map(d=>DB.upsertDayConfig(uid,d,v[d])));}catch(e){console.error(e);}
    }
  };
  const saveS=(v)=>setSessions(v);
  const saveBW=(v)=>setBodyWeight(v);
  const saveLib=(v)=>setLibrary(v);
  const saveSettings=async(v)=>{
    setSettings(v);
    LS.set("jt-settings",v);
    if(uid){try{await DB.upsertSettings(uid,{...v,darkMode});}catch(e){console.error(e);}}
  };
  const navTo=(v)=>{setView(v);setEditingTpl(null);};

  const getActiveEx=(day)=>{
    const cfg=dayConfig[day];
    if(cfg.templateId){const t=templates.find(t=>t.id===cfg.templateId);return t?t.exercises:[];}
    return cfg.customExercises||[];
  };

  // ─ PR detection ─
  function detectPRs(exerciseName,sets){
    const prog=buildProgressData(sessions);
    const hist=prog[exerciseName]||[];
    const prevMax=hist.length>0?Math.max(0,...hist.flatMap(h=>h.sets.map(s=>s.weight||0))):0;
    const newMax=Math.max(0,...(sets||[]).filter(s=>s.setType!=="warmup").map(s=>{
      if(s.type==="drop"&&s.drops)return Math.max(0,...s.drops.map(d=>parseWeight(d.weight).total));
      return parseWeight(s.weight).total;
    }));
    return newMax>prevMax?newMax:null;
  }

  // ─ PLAN ─
  const assignTemplate=(day,tid)=>{
    const v={...dayConfig,[day]:{...dayConfig[day],templateId:tid||null}};
    saveDC(v,day);
  };
  const toggleRestDay=(day)=>{
    const v={...dayConfig,[day]:{...dayConfig[day],restDay:!dayConfig[day].restDay}};
    saveDC(v,day);
  };
  const addCustomEx=()=>{
    if(!newCustomEx.name.trim())return;
    const v={...dayConfig,[activeDay]:{...dayConfig[activeDay],customExercises:[...(dayConfig[activeDay].customExercises||[]),{...newCustomEx,id:genId()}]}};
    saveDC(v,activeDay);
    setNewCustomEx({name:"",muscles:[],sets:3,reps:10});setShowAddCustomEx(false);showToast("Übung hinzugefügt ✓");
  };
  const removeCustomEx=(day,id)=>{
    const v={...dayConfig,[day]:{...dayConfig[day],customExercises:(dayConfig[day].customExercises||[]).filter(e=>e.id!==id)}};
    saveDC(v,day);
  };
  const moveCustomEx=(day,idx,dir)=>{
    const exs=[...(dayConfig[day].customExercises||[])];
    const to=idx+dir;
    if(to<0||to>=exs.length)return;
    [exs[idx],exs[to]]=[exs[to],exs[idx]];
    const v={...dayConfig,[day]:{...dayConfig[day],customExercises:exs}};
    saveDC(v,day);
  };

  // ─ SESSION ─
  // Get last session data for an exercise name
  const getLastSessionData=(exName)=>{
    const hist=Object.values(sessions).filter(s=>s.exercises?.some(e=>e.name===exName)).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    if(!hist.length)return null;
    return hist[0].exercises.find(e=>e.name===exName);
  };

  const startSession=()=>{
    const exs=getActiveEx(activeDay);
    if(!exs.length)return;
    const init={};
    exs.forEach(ex=>{init[ex.id]=Array.from({length:ex.sets},()=>({reps:ex.reps,weight:"",type:"normal",setType:"normal"}));});
    setSessionExercises(exs);setSessionData(init);setSessionDate(todayStr());setSessionNotes("");setView("session");
  };

  const updateSetField=(exId,si,field,val)=>setSessionData(prev=>{const c=deepClone(prev);c[exId][si][field]=val;return c;});
  const toggleDropSet=(exId,si)=>setSessionData(prev=>{
    const c=deepClone(prev);const set=c[exId][si];
    if(set.type==="drop"){c[exId][si]={reps:set.drops?.[0]?.reps||10,weight:set.drops?.[0]?.weight||"",type:"normal",setType:set.setType||"normal"};}
    else{c[exId][si]={type:"drop",setType:set.setType||"normal",drops:[{reps:set.reps||10,weight:set.weight||""},{reps:set.reps||10,weight:""}]};}
    return c;
  });
  const toggleWarmup=(exId,si)=>setSessionData(prev=>{
    const c=deepClone(prev);const set=c[exId][si];
    c[exId][si]={...set,setType:set.setType==="warmup"?"normal":"warmup"};
    return c;
  });
  const addDropUnit=(exId,si)=>setSessionData(prev=>{const c=deepClone(prev);const l=c[exId][si].drops[c[exId][si].drops.length-1];c[exId][si].drops.push({reps:l?.reps||10,weight:""});return c;});
  const removeDropUnit=(exId,si,di)=>setSessionData(prev=>{const c=deepClone(prev);c[exId][si].drops=c[exId][si].drops.filter((_,i)=>i!==di);return c;});
  const updateDropField=(exId,si,di,field,val)=>setSessionData(prev=>{const c=deepClone(prev);c[exId][si].drops[di][field]=val;return c;});
  const addSetToEx=(exId)=>setSessionData(prev=>{const c=deepClone(prev);const l=c[exId][c[exId].length-1];c[exId].push({reps:l?.reps||10,weight:"",type:"normal",setType:"normal"});return c;});
  const removeSetFromEx=(exId,si)=>setSessionData(prev=>{const c=deepClone(prev);c[exId]=c[exId].filter((_,i)=>i!==si);return c;});
  const moveExInSession=(idx,dir)=>{
    setSessionExercises(prev=>{const a=[...prev];const to=idx+dir;if(to<0||to>=a.length)return a;[a[idx],a[to]]=[a[to],a[idx]];return a;});
  };
  const addExInSession=()=>{
    if(!newSessionEx.name.trim())return;
    const ex={...newSessionEx,id:genId()};
    setSessionExercises(prev=>[...prev,ex]);
    setSessionData(prev=>({...prev,[ex.id]:Array.from({length:ex.sets},()=>({reps:ex.reps,weight:"",type:"normal",setType:"normal"}))}));
    setNewSessionEx({name:"",muscles:[],sets:3,reps:10});setShowAddInSession(false);showToast("Übung hinzugefügt ✓");
  };
  const removeExInSession=(exId)=>{
    setSessionExercises(prev=>prev.filter(e=>e.id!==exId));
    setSessionData(prev=>{const c={...prev};delete c[exId];return c;});
  };

  const finishSession=async()=>{
    const cfg=dayConfig[activeDay],tplName=cfg.templateId?(templates.find(t=>t.id===cfg.templateId)?.name||""):"";
    const exercisesData=sessionExercises.map(ex=>({name:ex.name,muscles:ex.muscles||[],sets:sessionData[ex.id]||[]}));
    const prs=[];
    exercisesData.forEach(ex=>{const pr=detectPRs(ex.name,ex.sets);if(pr)prs.push({exercise:ex.name,value:pr});});
    const entry={day:activeDay,date:sessionDate,templateName:tplName,notes:sessionNotes,exercises:exercisesData};
    try{
      if(uid){
        const row=await DB.insertSession(uid,entry);
        setSessions(prev=>({...prev,[row.id]:{...entry,_dbId:row.id}}));
      } else {
        const key=`${sessionDate}-${activeDay}-${Date.now()}`;
        setSessions(prev=>({...prev,[key]:entry}));
      }
    }catch(e){console.error(e);showToast("Fehler beim Speichern ✗");return;}
    setView("plan");setActiveTimer(null);
    showToast("Training gespeichert 🎯");
    if(prs.length>0)setTimeout(()=>setPrPopup(prs),300);
  };

  // ─ TEMPLATES ─
  const createTpl=()=>{setEditingTpl({id:genId(),name:"",exercises:[],isNew:true});setShowAddExToTpl(false);setNewTplEx({name:"",muscles:[],sets:3,reps:10});setEditingTplExIdx(null);};
  const openTpl=(t)=>{setEditingTpl({...t,isNew:false});setShowAddExToTpl(false);setNewTplEx({name:"",muscles:[],sets:3,reps:10});setEditingTplExIdx(null);};
  const saveTpl=async()=>{
    if(!editingTpl.name.trim())return;
    const tpl={id:editingTpl.id,name:editingTpl.name,exercises:editingTpl.exercises,_dbId:editingTpl._dbId};
    try{
      if(uid){const row=await DB.upsertTemplate(uid,tpl);tpl._dbId=row.id;}
    }catch(e){console.error(e);}
    const updated=editingTpl.isNew?[...templates,tpl]:templates.map(t=>t.id===tpl.id?tpl:t);
    setTemplates(updated);
    setEditingTpl(null);showToast("Plan gespeichert ✓");
  };
  const deleteTpl=async(id)=>{
    const tpl=templates.find(t=>t.id===id);
    try{if(uid&&tpl?._dbId)await DB.deleteTemplate(tpl._dbId);}catch(e){console.error(e);}
    setTemplates(templates.filter(t=>t.id!==id));
    const dc={...dayConfig};DAYS.forEach(d=>{if(dc[d].templateId===id){dc[d]={...dc[d],templateId:null};if(uid)DB.upsertDayConfig(uid,d,dc[d]).catch(()=>{});}});
    setDayConfig(dc);showToast("Plan gelöscht");
  };
  const addExToTpl=()=>{
    if(!newTplEx.name.trim())return;
    setEditingTpl(prev=>({...prev,exercises:[...prev.exercises,{...newTplEx,id:genId()}]}));
    setNewTplEx({name:"",muscles:[],sets:3,reps:10});setShowAddExToTpl(false);
  };
  const moveTplEx=(idx,dir)=>{
    setEditingTpl(prev=>{const a=[...prev.exercises];const to=idx+dir;if(to<0||to>=a.length)return prev;[a[idx],a[to]]=[a[to],a[idx]];return{...prev,exercises:a};});
  };

  // ─ LOG ─
  const openEditSession=(key)=>setEditingSession({key,session:deepClone(sessions[key])});
  const saveEditedSession=async(key,updated)=>{
    try{
      if(uid&&sessions[key]?._dbId)await DB.updateSession(sessions[key]._dbId,updated);
    }catch(e){console.error(e);}
    setSessions(prev=>({...prev,[key]:{...updated,_dbId:prev[key]?._dbId}}));
    setEditingSession(null);showToast("Training aktualisiert ✓");
  };
  const deleteSession=async(key)=>{
    try{
      if(uid&&sessions[key]?._dbId)await DB.deleteSession(sessions[key]._dbId);
    }catch(e){console.error(e);}
    setSessions(prev=>{const u={...prev};delete u[key];return u;});
    showToast("Training gelöscht");
  };

  // ─ LIBRARY ─
  const addToLibrary=async(ex)=>{
    if(!ex.name.trim())return;
    const entry={id:genId(),name:ex.name,muscles:ex.muscles||[],sets:ex.sets||3,reps:ex.reps||10};
    setLibrary(prev=>[...prev.filter(l=>l.name!==ex.name),entry]);
    try{if(uid)await DB.upsertLibraryEntry(uid,entry);}catch(e){console.error(e);}
    showToast("Zur Bibliothek hinzugefügt ✓");
  };
  const deleteLibraryEntry=async(id)=>{
    const entry=library.find(l=>l.id===id);
    setLibrary(prev=>prev.filter(l=>l.id!==id));
    try{if(uid&&entry)await DB.deleteLibraryEntry(uid,entry.name);}catch(e){console.error(e);}
  };

  // ─ BODY WEIGHT ─
  const addBodyWeight=async(entry)=>{
    setBodyWeight(prev=>[...prev.filter(e=>e.date!==entry.date),entry].sort((a,b)=>a.date.localeCompare(b.date)));
    try{if(uid)await DB.upsertBodyWeight(uid,entry);}catch(e){console.error(e);}
    showToast("Gewicht gespeichert ✓");
  };
  const deleteBodyWeight=async(id)=>{
    const entry=bodyWeight.find(e=>e.id===id);
    setBodyWeight(prev=>prev.filter(e=>e.id!==id));
    try{if(uid&&entry)await DB.deleteBodyWeight(uid,entry.date);}catch(e){console.error(e);}
  };

  // ─ EXPORT / IMPORT ─
  const exportData=()=>{
    const data={sessions,templates,dayConfig,bodyWeight,library,settings,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`justtrain-backup-${todayStr()}.json`;a.click();
    URL.revokeObjectURL(url);showToast("Export erfolgreich ✓");
  };
  const importData=async(jsonStr)=>{
    try{
      const data=JSON.parse(jsonStr);
      if(!uid){showToast("Bitte zuerst anmelden ✗");return;}

      showToast("Importiere in Cloud…");
      setDataLoading(true);

      const promises=[];

      // Templates
      if(data.templates){
        promises.push(...data.templates.map(t=>DB.upsertTemplate(uid,t).catch(e=>console.error("template:",e))));
      }

      // Day config
      if(data.dayConfig){
        promises.push(...DAYS.filter(d=>data.dayConfig[d]).map(d=>DB.upsertDayConfig(uid,d,data.dayConfig[d]).catch(e=>console.error("dayconfig:",e))));
      }

      // Sessions — war vorher komplett vergessen
      if(data.sessions){
        const sessionList=Object.values(data.sessions);
        promises.push(...sessionList.map(s=>DB.insertSession(uid,s).catch(e=>console.error("session:",e))));
      }

      // Body weight
      if(data.bodyWeight){
        promises.push(...data.bodyWeight.map(e=>DB.upsertBodyWeight(uid,e).catch(e=>console.error("bodyweight:",e))));
      }

      // Library
      if(data.library){
        promises.push(...data.library.map(e=>DB.upsertLibraryEntry(uid,e).catch(e=>console.error("library:",e))));
      }

      await Promise.all(promises);

      // Nach erfolgreichem Upload: Daten frisch aus Supabase laden
      // (damit lokale IDs durch Supabase-IDs ersetzt werden)
      await loadAllData(uid);

      setDataLoading(false);
      showToast("Import erfolgreich ✓");
    }catch(e){
      setDataLoading(false);
      console.error("Import error:",e);
      showToast("Import fehlgeschlagen ✗");
    }
  };

  // ─ PROGRESS ─
  const progressData=buildProgressData(sessions);
  const exerciseNames=Object.keys(progressData).sort();
  useEffect(()=>{if(exerciseNames.length>0&&!progressEx)setProgressEx(exerciseNames[0]);},[exerciseNames.length]);
  const metricOpts=[
    {key:"maxWeight",label:"Max. Gewicht",unit:"kg",color:C.accent},
    {key:"volume",label:"Volumen",unit:"kg·Wdh",color:C.blue},
    {key:"totalReps",label:"Gesamt Wdh.",unit:"",color:C.yellow},
    {key:"setsCount",label:"Sätze",unit:"",color:C.orange},
  ];
  const selHistory=progressEx?(progressData[progressEx]||[]):[];
  const selStats=selHistory.map(h=>calcStats(h.sets));
  const sortedLog=Object.entries(sessions).sort((a,b)=>(b[1].date||"").localeCompare(a[1].date||""));

  // ─ RENDER GATES ─
  if(authLoading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"-apple-system,'Inter','Segoe UI',sans-serif"}}>
      <div style={{fontSize:40}}>🏋️</div>
      <div style={{fontSize:14,color:C.textMuted}}>Wird geladen…</div>
    </div>
  );
  if(!user)return <AuthScreen/>;

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.textPrimary,fontFamily:"-apple-system,'Inter','Segoe UI',sans-serif",fontSize:14,paddingTop:"env(safe-area-inset-top)",transition:"background .25s,color .25s"}}>
      {dataLoading&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:C.accent,zIndex:999,animation:"timerPulse 1s infinite"}}/>}
      <Toast msg={toast}/>
      {prPopup&&<PRPopup prs={prPopup} onClose={()=>setPrPopup(null)}/>}
      {editingSession&&<EditSessionModal sessionKey={editingSession.key} session={editingSession.session} onSave={saveEditedSession} onClose={()=>setEditingSession(null)}/>}
      {showSettings&&<SettingsModal settings={settings} onSave={saveSettings} onClose={()=>setShowSettings(false)} onExport={exportData} onImport={importData}/>}
      {showLibrary&&<LibraryModal library={library} onClose={()=>setShowLibrary(false)} onDelete={deleteLibraryEntry}/>}

      <div style={{maxWidth:680,margin:"0 auto",padding:"0 16px 120px"}}>

        {/* HEADER */}
        <div style={{padding:"24px 0 18px",borderBottom:`1px solid ${C.border}`,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.2em",color:C.accent,marginBottom:2}}>YOUR GYM COMPANION</div>
            <h1 style={{margin:0,fontSize:28,fontWeight:900,color:C.textPrimary,letterSpacing:"-0.04em"}}>Just<span style={{color:C.accent}}>Train</span></h1>
            <div style={{fontSize:11,color:C.textMuted,marginTop:3}}>{user.email}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
            {installPrompt&&(
              <button onClick={()=>{installPrompt.prompt();installPrompt.userChoice.then(()=>setInstallPrompt(null));}}
                style={{background:C.accentDim,border:`1px solid ${C.accent}`,color:C.accent,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",borderRadius:8}}
                title="App installieren">⬇ App</button>
            )}
            <button onClick={()=>setDarkMode(d=>!d)}
              style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textMuted,padding:"8px 12px",cursor:"pointer",fontSize:16,fontFamily:"inherit",borderRadius:8}}
              title={darkMode?"Light Mode":"Dark Mode"}>{darkMode?"☀️":"🌙"}</button>
            <button onClick={()=>setShowLibrary(true)} style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textMuted,padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8}} title="Übungsbibliothek">📚</button>
            <button onClick={()=>setShowSettings(true)} style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textMuted,padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8}} title="Einstellungen">⚙️</button>
            <button onClick={async()=>{await DB.signOut();setUser(null);setTemplates([]);setSessions({});setDayConfig(Object.fromEntries(DAYS.map(d=>[d,{templateId:null,customExercises:[],restDay:false}])));setBodyWeight([]);setLibrary([]);}}
              style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textMuted,padding:"8px 12px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8}}
              title="Abmelden">🚪</button>
          </div>
        </div>

        {/* TOP NAV */}
        {view!=="session"&&(
          <div style={{display:"flex",gap:6,marginBottom:24,flexWrap:"wrap"}}>
            {[["plan","📋 Woche"],["templates","📁 Pläne"],["progress","📈 Fortschritt"],["log","🗓 Verlauf"]].map(([v,label])=>(
              <button key={v} onClick={()=>navTo(v)} style={{background:view===v?C.accent:C.surface,color:view===v?C.accentText:C.textSecondary,border:`1px solid ${view===v?C.accent:C.border}`,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:view===v?700:500,fontFamily:"inherit",borderRadius:8}}>{label}</button>
            ))}
          </div>
        )}

        {/* ══════════════ PLAN VIEW ══════════════ */}
        {view==="plan"&&(
          <div>
            {/* Day tabs */}
            <div style={{display:"flex",gap:3,marginBottom:20}}>
              {DAYS.map((day,i)=>{
                const cnt=getActiveEx(day).length,hasTpl=!!dayConfig[day].templateId,isRest=dayConfig[day].restDay,active=activeDay===day;
                return<button key={day} onClick={()=>setActiveDay(day)} style={{flex:1,background:active?(isRest?C.restDim:C.accent):C.surface,color:active?(isRest?C.rest:C.accentText):isRest?C.rest:C.textMuted,border:`1px solid ${active?(isRest?C.rest:C.accent):isRest?C.rest+"55":C.border}`,padding:"9px 2px",cursor:"pointer",fontSize:10,fontWeight:active?800:500,fontFamily:"inherit",borderRadius:6}}>
                  {DSHORT[i]}
                  <div style={{fontSize:9,marginTop:3}}>{isRest?"🛌":cnt>0?(hasTpl?"●":String(cnt)):"·"}</div>
                </button>;
              })}
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{...sc.lbl,marginBottom:4}}>Trainingstag</div>
                <div style={{fontSize:22,fontWeight:800,color:C.textPrimary}}>{activeDay}</div>
                {dayConfig[activeDay].restDay&&<div style={{fontSize:12,color:C.rest,marginTop:2,fontWeight:700}}>🛌 Ruhetag</div>}
              </div>
              <div style={{display:"flex",gap:8,flexDirection:"column",alignItems:"flex-end"}}>
                {!dayConfig[activeDay].restDay&&getActiveEx(activeDay).length>0&&<button onClick={startSession} style={{...sc.btnP,fontSize:13,padding:"10px 20px"}}>▶ Training starten</button>}
                <button onClick={()=>toggleRestDay(activeDay)} style={{background:dayConfig[activeDay].restDay?C.restDim:C.surfaceHover,border:`1px solid ${dayConfig[activeDay].restDay?C.rest:C.border}`,color:dayConfig[activeDay].restDay?C.rest:C.textMuted,padding:"7px 12px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,fontWeight:dayConfig[activeDay].restDay?700:400}}>
                  {dayConfig[activeDay].restDay?"✕ Kein Ruhetag":"🛌 Ruhetag"}
                </button>
              </div>
            </div>

            {!dayConfig[activeDay].restDay&&(
              <>
                <div style={{...sc.card,padding:"14px 16px",marginBottom:16}}>
                  <div style={{...sc.lbl,marginBottom:10}}>Trainingsplan für diesen Tag</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>assignTemplate(activeDay,null)} style={{background:!dayConfig[activeDay].templateId?C.surfaceHover:"transparent",color:!dayConfig[activeDay].templateId?C.textPrimary:C.textMuted,border:`1px solid ${!dayConfig[activeDay].templateId?C.borderLight:C.border}`,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:!dayConfig[activeDay].templateId?700:400}}>Individuell</button>

                                    <button onClick={()=>removeCustomEx(activeDay,ex.id)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:"2px 5px"}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>

                {!dayConfig[activeDay].templateId&&(

                    <button onClick={()=>setShowAddCustomEx(!showAddCustomEx)} style={{marginTop:10,width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"11px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8}}>+ Übung hinzufügen</button>

                  </>
                )}
              </>

          </div>

        {/* ══════════════ TEMPLATES LIST ══════════════ */}
        {view==="templates"&&!editingTpl&&(

            {templates.length===0?(
              <div style={{...sc.card,padding:"44px 24px",textAlign:"center",borderStyle:"dashed"}}>
                <div style={{fontSize:32,marginBottom:12}}>📋</div>

            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {templates.map(t=>(
                  <div key={t.id} style={{...sc.card,overflow:"hidden"}}>
                    <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14,color:C.textPrimary}}>{t.name}</div>
                        <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{t.exercises.length} Übungen</div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>openTpl(t)} style={{...sc.btnS,padding:"6px 12px",fontSize:12}}>Bearbeiten</button>
                        <button onClick={()=>deleteTpl(t.id)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,padding:"6px 10px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:6}} onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color=C.textMuted}>✕</button>

                  </div>

        )}

        {/* ══════════════ TEMPLATE EDITOR ══════════════ */}
        {view==="templates"&&editingTpl&&(()=>{
          // local state for inline exercise editing — hoisted into render via IIFE
          // We track which exercise index is being edited via editingTplExIdx
          return(
          <div>

            <input placeholder="Planname (z.B. Push Day, Leg Day...)" value={editingTpl.name} onChange={e=>setEditingTpl(p=>({...p,name:e.target.value}))} style={{...sc.inp,marginBottom:16,fontSize:16,fontWeight:700}}/>

            {/* Group exercises by primary muscle group */}
            {(()=>{
              const exs=editingTpl.exercises;
              if(!exs.length)return(
                <div style={{...sc.card,padding:"28px",textAlign:"center",borderStyle:"dashed",marginBottom:12}}>
                  <div style={{color:C.textMuted,fontSize:13}}>Noch keine Übungen — füge unten welche hinzu</div>
                </div>
              );
              const grouped=groupExercisesByMuscle(exs);return Object.entries(grouped).map(([group,items])=>(
                <div key={group} style={{marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:C.accent,marginBottom:6,paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>{group.toUpperCase()}</div>

                        // Inline edit form

                          setEx={setEditingTplExForm}
                          library={library}
                          onSaveToLibrary={addToLibrary}
                          onSave={()=>{
                            if(!editingTplExForm.name.trim())return;
                            setEditingTpl(p=>({...p,exercises:p.exercises.map((e,i)=>i===origIdx?{...editingTplExForm,id:e.id}:e)}));
                            setEditingTplExIdx(null);
                          }}
                          onCancel={()=>setEditingTplExIdx(null)}
                        />
                      ):(
                        <div style={{...sc.card,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:700,fontSize:13,color:C.textPrimary,marginBottom:3}}>{ex.name}</div>
                            <div style={{fontSize:11,color:C.textSecondary}}><span style={{color:C.accent,fontWeight:700}}>{ex.sets}</span> Sätze · <span style={{color:C.accent,fontWeight:700}}>{ex.reps}</span> Wdh.</div>
                            <MuscleTags muscles={ex.muscles} small/>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:3,marginLeft:8}}>
                            <button onClick={()=>{setEditingTplExIdx(origIdx);setEditingTplExForm({...ex});}} style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textSecondary,cursor:"pointer",fontSize:10,padding:"4px 7px",borderRadius:5,fontFamily:"inherit"}}>✏️</button>
                            <button onClick={()=>moveTplEx(origIdx,-1)} disabled={origIdx===0} style={{background:"none",border:"none",color:origIdx===0?C.border:C.textMuted,cursor:origIdx===0?"default":"pointer",fontSize:13,padding:"1px 4px"}}>▲</button>
                            <button onClick={()=>moveTplEx(origIdx,1)} disabled={origIdx===editingTpl.exercises.length-1} style={{background:"none",border:"none",color:origIdx===editingTpl.exercises.length-1?C.border:C.textMuted,cursor:origIdx===editingTpl.exercises.length-1?"default":"pointer",fontSize:13,padding:"1px 4px"}}>▼</button>
                            <button onClick={()=>setEditingTpl(p=>({...p,exercises:p.exercises.filter(e=>e.id!==ex.id)}))} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,padding:"1px 4px"}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.textMuted}>✕</button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              ));
            })()}

            <button onClick={()=>setShowAddExToTpl(!showAddExToTpl)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"11px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,marginBottom:10}}>+ Übung hinzufügen</button>
            {showAddExToTpl&&<ExerciseForm ex={newTplEx} setEx={setNewTplEx} onSave={addExToTpl} onCancel={()=>setShowAddExToTpl(false)} library={library} onSaveToLibrary={addToLibrary}/>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveTpl} style={{...sc.btnP,flex:1,fontSize:14}}>Plan speichern</button>
              <button onClick={()=>setEditingTpl(null)} style={sc.btnS}>Abbrechen</button>
            </div>
          </div>
          );
        })()}

        {/* ══════════════ SESSION VIEW ══════════════ */}
        {view==="session"&&(
          <div style={{paddingTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div>
                <div style={{...sc.lbl,color:C.accent,marginBottom:4}}>Aktives Training</div>
                <div style={{fontSize:22,fontWeight:800,color:C.textPrimary}}>{activeDay}</div>
                {dayConfig[activeDay].templateId&&templates.find(t=>t.id===dayConfig[activeDay].templateId)&&<div style={{fontSize:12,color:C.textSecondary,marginTop:2}}>{templates.find(t=>t.id===dayConfig[activeDay].templateId).name}</div>}
              </div>
              <button onClick={()=>{setView("plan");setActiveTimer(null);}} style={{...sc.btnS,padding:"8px 14px"}}>✕ Abbrechen</button>
            </div>

            <div style={{...sc.card,padding:"12px 16px",marginBottom:16}}>
              <div style={{...sc.lbl,marginBottom:8}}>Datum</div>
              <input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} style={{...sc.inp,colorScheme:"dark",fontSize:15,fontWeight:700}}/>
            </div>

            {/* Timer */}
            {activeTimer&&settings.timerEnabled&&(
              <PauseTimer duration={settings.timerDuration||90} onDone={()=>setActiveTimer(null)} onSkip={()=>setActiveTimer(null)}/>
            )}

            {sessionExercises.map((ex,ei)=>{
              const lastData=getLastSessionData(ex.name);
              return(
                <div key={ex.id} style={{...sc.card,marginBottom:12,padding:"14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{flex:1}}>
                      <div style={{...sc.lbl,marginBottom:2}}>#{String(ei+1).padStart(2,"0")}</div>
                      <div style={{fontWeight:700,fontSize:15,color:C.textPrimary}}>{ex.name}</div>
                      <MuscleTags muscles={ex.muscles} small/>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <button onClick={()=>moveExInSession(ei,-1)} disabled={ei===0} style={{background:"none",border:"none",color:ei===0?C.border:C.textMuted,cursor:ei===0?"default":"pointer",fontSize:16,padding:"2px 4px"}}>▲</button>
                      <button onClick={()=>moveExInSession(ei,1)} disabled={ei===sessionExercises.length-1} style={{background:"none",border:"none",color:ei===sessionExercises.length-1?C.border:C.textMuted,cursor:ei===sessionExercises.length-1?"default":"pointer",fontSize:16,padding:"2px 4px"}}>▼</button>
                      <button onClick={()=>removeExInSession(ex.id)} style={{background:C.redDim,border:`1px solid ${C.red}`,color:C.red,cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,padding:"5px 8px"}}>entf.</button>
                    </div>
                  </div>

                  {/* Last session preview */}
                  {lastData&&(
                    <div style={{...sc.card,padding:"8px 12px",marginBottom:10,background:C.bg}}>
                      <div style={{...sc.lbl,fontSize:9,marginBottom:5,color:C.blue}}>Letztes Training</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {(lastData.sets||[]).map((set,si)=><SetDisplay key={si} set={set} si={si}/>)}
                      </div>
                    </div>
                  )}

                  {/* Set col headers */}
                  <div style={{display:"grid",gridTemplateColumns:"36px 1fr auto auto auto",gap:5,marginBottom:5}}>
                    <div style={{...sc.lbl,textAlign:"center",fontSize:9}}>Satz</div>
                    <div style={{...sc.lbl,fontSize:9}}>Wdh. / kg</div>
                    <div style={{...sc.lbl,textAlign:"center",fontSize:9}}>W</div>
                    <div style={{...sc.lbl,textAlign:"center",fontSize:9}}>↓</div>
                    <div/>
                  </div>

                  {(sessionData[ex.id]||[]).map((set,si)=>(
                    <SetRow key={si} set={set} si={si} exId={ex.id}
                      onUpdate={(field,val)=>updateSetField(ex.id,si,field,val)}
                      onRemove={()=>removeSetFromEx(ex.id,si)}
                      onToggleDrop={()=>toggleDropSet(ex.id,si)}
                      onToggleWarmup={()=>toggleWarmup(ex.id,si)}
                      onAddDrop={()=>addDropUnit(ex.id,si)}
                      onRemoveDrop={(di)=>removeDropUnit(ex.id,si,di)}
                      onUpdateDrop={(di,f,v)=>updateDropField(ex.id,si,di,f,v)}
                      onSetDone={()=>setActiveTimer({exId:ex.id,si})}
                      timerEnabled={settings.timerEnabled}
                    />
                  ))}
                  <button onClick={()=>addSetToEx(ex.id)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"7px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:6,marginTop:4}}>+ Satz hinzufügen</button>
                </div>
              );
            })}

            <button onClick={()=>setShowAddInSession(!showAddInSession)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,color:C.textMuted,padding:"11px",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,marginBottom:10}}>+ Übung hinzufügen</button>
            {showAddInSession&&<ExerciseForm ex={newSessionEx} setEx={setNewSessionEx} onSave={addExInSession} onCancel={()=>setShowAddInSession(false)} title="Übung zum Training hinzufügen" library={library} onSaveToLibrary={addToLibrary}/>}

            <div style={{...sc.card,padding:"12px 16px",marginBottom:12}}>
              <div style={{...sc.lbl,marginBottom:8}}>Notizen zum Training</div>
              <textarea value={sessionNotes} onChange={e=>setSessionNotes(e.target.value)} placeholder="Wie lief das Training? Besonderheiten, Befinden, ..." style={{...sc.inp,resize:"none",height:72,fontSize:13}}/>
            </div>

            <button onClick={finishSession} style={{width:"100%",background:C.accent,color:C.accentText,border:"none",padding:"16px",cursor:"pointer",fontSize:15,fontWeight:800,fontFamily:"inherit",borderRadius:8}}>✓ Training abschließen</button>
          </div>
        )}

        {/* ══════════════ PROGRESS VIEW ══════════════ */}
        {view==="progress"&&(
          <div>
            <div style={{fontWeight:700,fontSize:18,color:C.textPrimary,marginBottom:16}}>Fortschritt</div>
            {/* Sub tabs */}
            <div style={{display:"flex",gap:5,marginBottom:20,overflowX:"auto"}}>
              {[["exercise","💪 Übungen"],["calendar","📅 Kalender"],["weekly","📊 Wochenvolumen"],["body","⚖️ Körpergewicht"]].map(([t,label])=>(
                <button key={t} onClick={()=>setProgressTab(t)} style={{background:progressTab===t?C.accent:C.surface,color:progressTab===t?C.accentText:C.textSecondary,border:`1px solid ${progressTab===t?C.accent:C.border}`,padding:"8px 14px",cursor:"pointer",fontSize:12,fontWeight:progressTab===t?700:400,fontFamily:"inherit",borderRadius:8,whiteSpace:"nowrap"}}>{label}</button>
              ))}
            </div>

            {progressTab==="calendar"&&<FreqCalendar sessions={sessions}/>}
            {progressTab==="weekly"&&(Object.keys(sessions).length<2?<div style={{...sc.card,padding:"44px 24px",textAlign:"center",borderStyle:"dashed"}}><div style={{fontSize:32,marginBottom:12}}>📊</div><div style={{color:C.textMuted,fontSize:13}}>Mindestens 2 Trainings nötig.</div></div>:<WeeklyVolumeChart sessions={sessions}/>)}
            {progressTab==="body"&&<BodyWeightSection entries={bodyWeight} onAdd={addBodyWeight} onDelete={deleteBodyWeight}/>}

            {progressTab==="exercise"&&(
              <>
                {exerciseNames.length===0?(
                  <div style={{...sc.card,padding:"44px 24px",textAlign:"center",borderStyle:"dashed"}}>
                    <div style={{fontSize:32,marginBottom:12}}>📈</div>
                    <div style={{color:C.textSecondary,fontSize:14,marginBottom:4}}>Noch keine Daten.</div>
                    <div style={{color:C.textMuted,fontSize:12}}>Schließe Trainings ab, um den Fortschritt zu sehen.</div>
                  </div>
                ):(
                  <>
                    <div style={{...sc.card,padding:"12px 16px",marginBottom:14}}>
                      <div style={{...sc.lbl,marginBottom:10}}>Übung auswählen</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {exerciseNames.map(name=><button key={name} onClick={()=>setProgressEx(name)} style={{background:progressEx===name?C.accent:C.surfaceHover,color:progressEx===name?C.accentText:C.textSecondary,border:`1px solid ${progressEx===name?C.accent:C.border}`,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:progressEx===name?700:400}}>{name}</button>)}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
                      {metricOpts.map(m=><button key={m.key} onClick={()=>setProgressMetric(m.key)} style={{background:progressMetric===m.key?m.color:C.surface,color:progressMetric===m.key?C.accentText:C.textSecondary,border:`1px solid ${progressMetric===m.key?m.color:C.border}`,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:6,fontWeight:progressMetric===m.key?700:400}}>{m.label}</button>)}
                    </div>
                    {progressEx&&selHistory.length>0&&(()=>{
                      const metric=metricOpts.find(m=>m.key===progressMetric);
                      const values=selStats.map(s=>s[progressMetric]);
                      const first=values[0],last=values[values.length-1],max=Math.max(...values);
                      return(
                        <>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                            {[
                              {label:"Erster Wert",value:`${first}${metric.unit?" "+metric.unit:""}`,sub:fmtDate(selHistory[0].date)},
                              {label:"Aktuell",value:`${last}${metric.unit?" "+metric.unit:""}`,sub:fmtDate(selHistory[selHistory.length-1].date),hi:true},
                              {label:"Bestleistung",value:`${max}${metric.unit?" "+metric.unit:""}`,sub:`${selHistory.length} Einh.`,pr:true},
                            ].map((card,ci)=>(
                              <div key={ci} style={{...sc.card,padding:"12px",background:card.hi?C.accentDim:card.pr?C.prDim:C.surface,border:`1px solid ${card.hi?C.accent:card.pr?C.pr:C.border}`}}>
                                <div style={{...sc.lbl,marginBottom:5,color:card.hi?C.accent:card.pr?C.pr:C.textMuted,fontSize:9}}>{card.label}</div>
                                <div style={{fontWeight:800,fontSize:16,color:card.hi?C.accent:card.pr?C.pr:C.textPrimary}}>{card.value}</div>
                                <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{card.sub}</div>
                              </div>
                            ))}
                          </div>
                          {values.length>=2&&(
                            <div style={{...sc.card,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                              <div style={{fontSize:13,color:C.textSecondary}}>Gesamtentwicklung:</div>
                              <TrendBadge first={first} last={last}/>
                              <div style={{fontSize:11,color:C.textMuted}}>{last>first?`+${last-first} ${metric.unit} seit Beginn`:last<first?`${last-first} ${metric.unit} seit Beginn`:"Keine Veränderung"}</div>
                            </div>
                          )}
                          {values.length>=2&&(
                            <div style={{...sc.card,padding:"16px",marginBottom:14}}>
                              <div style={{...sc.lbl,marginBottom:14}}>{metric.label} über Zeit</div>
                              <LineChart data={values} dates={selHistory.map(h=>h.date)} color={metric.color} unit={metric.unit}/>
                            </div>
                          )}
                          <div style={{...sc.card,overflow:"hidden",marginBottom:14}}>
                            <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,...sc.lbl}}>Alle Einheiten — {progressEx}</div>
                            {[...selHistory].reverse().map((session,idx)=>{
                              const stat=calcStats(session.sets);
                              const prevIdx=selHistory.length-2-idx;
                              const prev=prevIdx>=0?calcStats(selHistory[prevIdx].sets):null;
                              const isPR=stat.maxWeight>0&&stat.maxWeight===Math.max(...selStats.map(s=>s.maxWeight));
                              return(
                                <div key={idx} style={{padding:"10px 14px",borderBottom:idx<selHistory.length-1?`1px solid ${C.border}`:"none",display:"flex",justifyContent:"space-between",alignItems:"flex-start",background:isPR?C.prDim:"transparent"}}>
                                  <div>
                                    <div style={{fontWeight:600,fontSize:12,color:isPR?C.pr:C.textPrimary,marginBottom:4}}>{fmtDate(session.date)}{isPR&&<span style={{marginLeft:6,fontSize:10}}>🏆 PR</span>}</div>
                                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                                      {session.sets.map((set,si)=><SetDisplay key={si} set={set} si={si}/>)}
                                    </div>
                                  </div>
                                  <div style={{textAlign:"right",minWidth:84}}>
                                    <div style={{fontSize:14,fontWeight:800,color:isPR?C.pr:C.textPrimary}}>{stat.maxWeight>0?`${stat.maxWeight} kg`:"–"}</div>
                                    <div style={{fontSize:10,color:C.textMuted}}>{stat.setsCount}×{stat.avgReps} Wdh.</div>
                                    {prev&&stat.maxWeight>0&&prev.maxWeight>0&&stat.maxWeight!==prev.maxWeight&&(
                                      <span style={{fontSize:10,fontWeight:700,color:stat.maxWeight>prev.maxWeight?C.accent:C.red}}>{stat.maxWeight>prev.maxWeight?"▲":"▼"} {Math.abs(stat.maxWeight-prev.maxWeight)} kg</span>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                          <MusclePanel sessions={sessions}/>
                        </>
                      );
                    })()}
                    {progressEx&&selHistory.length===0&&<div style={{...sc.card,padding:"32px",textAlign:"center",color:C.textMuted,fontSize:13}}>Keine Daten für diese Übung.</div>}
                  </>
                )}
              </>
            )}
          </div>
        )}

        {/* ══════════════ LOG VIEW ══════════════ */}
        {view==="log"&&(
          <div>
            <div style={{fontWeight:700,fontSize:18,color:C.textPrimary,marginBottom:20}}>Trainingsverlauf</div>
            {sortedLog.length===0?(
              <div style={{...sc.card,padding:"44px 24px",textAlign:"center",borderStyle:"dashed"}}>
                <div style={{fontSize:32,marginBottom:12}}>🗓</div>
                <div style={{color:C.textSecondary,fontSize:14}}>Noch keine abgeschlossenen Trainings</div>
              </div>
            ):(()=>{
              const weeks={};
              sortedLog.forEach(([key,session])=>{const wk=getWeekLabel(session.date);if(!weeks[wk])weeks[wk]=[];weeks[wk].push([key,session]);});
              return Object.entries(weeks).map(([week,entries])=>(
                <div key={week} style={{marginBottom:24}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.1em",color:C.accent,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>KW · {week}</div>
                  {entries.map(([key,session])=>(
                    <div key={key} style={{...sc.card,marginBottom:8,overflow:"hidden"}}>
                      <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:13,color:C.textPrimary}}>{session.day}</div>
                          {session.templateName&&<div style={{fontSize:10,color:C.accent,marginTop:1}}>{session.templateName}</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{fontSize:11,color:C.textSecondary}}>{fmtDate(session.date)}</div>
                          <button onClick={()=>openEditSession(key)} style={{background:C.surfaceHover,border:`1px solid ${C.border}`,color:C.textSecondary,padding:"4px 8px",cursor:"pointer",fontSize:11,fontFamily:"inherit",borderRadius:5}}>✏️</button>
                          <button onClick={()=>{if(confirm("Training löschen?"))deleteSession(key);}} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,padding:"4px 8px",cursor:"pointer",fontSize:12,fontFamily:"inherit",borderRadius:5}} onMouseEnter={e=>e.currentTarget.style.color=C.red} onMouseLeave={e=>e.currentTarget.style.color=C.textMuted}>✕</button>
                        </div>
                      </div>
                      {session.notes&&<div style={{padding:"8px 14px",borderBottom:`1px solid ${C.border}`,fontSize:12,color:C.textSecondary,fontStyle:"italic"}}>"{session.notes}"</div>}
                      <div style={{padding:"10px 14px"}}>
                        {(session.exercises||[]).map((ex,i)=>(
                          <div key={i} style={{marginBottom:8,paddingBottom:8,borderBottom:i<(session.exercises.length-1)?`1px solid ${C.border}`:"none"}}>
                            <div style={{fontSize:11,fontWeight:700,color:C.textSecondary,marginBottom:5}}>{ex.name}</div>
                            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                              {(ex.sets||[]).map((set,si)=><SetDisplay key={si} set={set} si={si}/>)}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ));
            })()}
          </div>
        )}

      </div>

      {/* Bottom tab bar */}
      {view!=="session"&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)",zIndex:100,transition:"background .25s"}}>
          {[["plan","📋","Woche"],["templates","📁","Pläne"],["progress","📈","Fortschritt"],["log","🗓","Verlauf"]].map(([v,icon,label])=>(
            <button key={v} onClick={()=>navTo(v)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>{icon}</span>
              <span style={{fontSize:10,fontWeight:view===v?700:400,color:view===v?C.accent:C.textMuted}}>{label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
